<script id="spendlab-v43-core-stable">
(function(){'use strict';if(window.__spendLabV43CoreStable)return;window.__spendLabV43CoreStable=true;var MONTHS_TH=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];var MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];var FILTER_KEY='spendlab.historyFilter.v43';var expanded=Object.create(null);var searchTimer=0;function getState(){try{return window.state||state}catch(e){return window.state||{}}}function lang(){var st=getState();return st&&st.lang==='en'?'en':'th'}function S(th,en){return lang()==='en'?en:th}function H(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}function I(n,z){try{return typeof icon==='function'?icon(n,z||14):''}catch(e){return''}}function T(k,th,en){try{if(typeof t==='function')return t(k)}catch(e){}return S(th||k,en||k)}function F(n){try{return typeof fmt==='function'?fmt(Math.round(+n||0)):String(Math.round(+n||0))}catch(e){return String(Math.round(+n||0))}}function money(n){return'฿'+F(n)}function dYear(y){try{return typeof displayYear==='function'?displayYear(y):(lang()==='th'?y+543:y)}catch(e){return lang()==='th'?y+543:y}}function monthName(m){return(lang()==='en'?MONTHS_EN:MONTHS_TH)[(+m||1)-1]||''}function pKey(m,y){return y+'-'+String(m).padStart(2,'0')}function pLabel(m,y){return monthName(m)+' '+dYear(+y)}function getDate(b){var d=new Date(b&&b.date||Date.now());return isNaN(d.getTime())?new Date():d}function norm(b){try{if(typeof normalizePurchaseBatch==='function')return normalizePurchaseBatch(b)}catch(e){}var d=getDate(b);var m=+b.periodMonth||d.getMonth()+1;var y=+b.periodYear||d.getFullYear();var o=Object.assign({},b);o.periodMonth=m;o.periodYear=y;o.periodKey=pKey(m,y);return o}function itemText(it){return[it.name,it.nameTh,it.nameEn,it.note,it.cat].filter(Boolean).join(' ').toLowerCase()}function itemName(it){try{return typeof trEsc==='function'?trEsc(it.name):H(it.name)}catch(e){return H(it.name)}}function catName(cat){try{return typeof catLabel==='function'?catLabel(cat):H(cat||'')}catch(e){return H(cat||'')}}function itemMatches(it,q){return!q||itemText(it).indexOf(q)!==-1}function rangeVal(m,y){return(+y)*12+(+m)}function allYears(){var st=getState();var years=new Set([new Date().getFullYear()]);((st&&st.purchases)||[]).forEach(function(b){var nb=norm(b);if(nb.periodYear)years.add(+nb.periodYear)});var c=new Date().getFullYear();for(var i=-2;i<=2;i++)years.add(c+i);return Array.from(years).filter(Boolean).sort(function(a,b){return b-a})}function defaultFilter(){var now=new Date();return{fromMonth:1,fromYear:now.getFullYear(),toMonth:12,toYear:now.getFullYear()}}function loadFilter(){var st=getState();if(!st.historyFilterV43){try{st.historyFilterV43=JSON.parse(localStorage.getItem(FILTER_KEY)||'null')||defaultFilter()}catch(e){st.historyFilterV43=defaultFilter()}}return st.historyFilterV43}function saveFilter(){try{localStorage.setItem(FILTER_KEY,JSON.stringify(loadFilter()))}catch(e){}}
function logoMarkup(){return'<div class="sl43-logo" aria-label="SpendLab by EverBlue"><div class="sl43-logo-word"><span class="sl43-spend">Spend</span><span class="sl43-lab">Lab</span></div><div class="sl43-logo-by">by EverBlue</div></div>'}function renderHeaderV43(){var st=getState();var historyCount=((st.purchases||[])).reduce(function(s,p){return s+((p.items||[]).length)},0);var isEn=st.lang==='en';return'<div class="header header-main sl43-header"><div class="brand-row"><div class="brand-stack" aria-label="SpendLab by EverBlue">'+logoMarkup()+'</div><div class="controls"><div class="lang-toggle" title="Language"><button class="lang-btn '+(st.lang==='th'?'active':'')+'" onclick="setLang(\'th\')">TH</button><button class="lang-btn '+(st.lang==='en'?'active':'')+'" onclick="setLang(\'en\')">EN</button></div><button class="reset-btn" onclick="openThemePicker()" title="'+H(isEn?'Theme':'ธีม')+'">'+I('sparkle',12)+'<span>'+H(isEn?'Theme':'ธีม')+'</span></button><button class="reset-btn" onclick="openDataPanel()" title="'+H(S('นำเข้า / ส่งออก','Import / Export'))+'">'+I('fileText',12)+'<span>'+H(S('ข้อมูล','Data'))+'</span></button><button class="reset-btn" onclick="resetAll()" title="'+H(T('reset','รีเซ็ต','Reset'))+'">'+I('refresh',12)+'<span>'+H(T('reset','รีเซ็ต','Reset'))+'</span></button></div></div><div class="tabs"><button class="tab '+(st.tab==='shop'?'active':'')+'" onclick="setTab(\'shop\')">'+I('bag',14)+' '+H(T('shop','Wishlist','Wishlist'))+'</button><button class="tab '+(st.tab==='history'?'active':'')+'" onclick="setTab(\'history\')">'+I('package',14)+' '+H(T('history','Purchased','Purchased'))+(historyCount>0?'<span class="tab-badge num">'+historyCount+'</span>':'')+'</button><button class="tab '+(st.tab==='tax'?'active':'')+'" onclick="setTab(\'tax\')">'+I('receipt',14)+' '+H(T('tax','ภาษี','Tax'))+'</button><button class="tab '+(st.tab==='overview'?'active':'')+'" onclick="setTab(\'overview\')">'+I('piechart',14)+' '+H(T('overview','ภาพรวม','Overview'))+'</button></div></div>'}window.renderHeader=renderHeaderV43;try{renderHeader=renderHeaderV43}catch(e){}
function groupData(){var st=getState(),f=loadFilter(),q=String(st.historySearchV43||'').toLowerCase().trim(),from=rangeVal(f.fromMonth,f.fromYear),to=rangeVal(f.toMonth,f.toYear);if(from>to){var tmp=from;from=to;to=tmp}var map=Object.create(null);((st&&st.purchases)||[]).map(norm).forEach(function(batch){var rv=rangeVal(batch.periodMonth,batch.periodYear);if(rv<from||rv>to)return;var items=(batch.items||[]).filter(function(it){return itemMatches(it,q)});if(!items.length)return;var key=pKey(batch.periodMonth,batch.periodYear);if(!map[key])map[key]={key:key,month:+batch.periodMonth,year:+batch.periodYear,batches:[],total:0,itemCount:0};var b=Object.assign({},batch,{items:items});var total=items.reduce(function(s,it){return s+(+it.price||0)},0);b._sl43Total=total;map[key].batches.push(b);map[key].total+=total;map[key].itemCount+=items.length});return Object.keys(map).map(function(k){return map[k]}).sort(function(a,b){return rangeVal(b.month,b.year)-rangeVal(a.month,a.year)})}function monthOptions(s){var arr=lang()==='en'?MONTHS_EN:MONTHS_TH;return arr.map(function(m,i){var v=i+1;return'<option value="'+v+'" '+(v==s?'selected':'')+'>'+H(m)+'</option>'}).join('')}function yearOptions(s){return allYears().map(function(y){return'<option value="'+y+'" '+(+y==+s?'selected':'')+'>'+dYear(+y)+'</option>'}).join('')}function batchTime(b){var d=getDate(b);try{return d.toLocaleDateString(lang()==='en'?'en-US':'th-TH',{day:'numeric',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString(lang()==='en'?'en-US':'th-TH',{hour:'2-digit',minute:'2-digit'})}catch(e){return d.toLocaleString()}}function itemRow(it){return'<div class="sl43-item"><div><div class="sl43-item-name">'+itemName(it)+'</div>'+(it.note?'<div class="sl43-item-note">'+H(it.note)+'</div>':'')+'<div class="sl43-item-cat">'+catName(it.cat)+'</div></div><div class="sl43-item-price">'+money(+it.price||0)+'</div></div>'}function batchCard(b){return'<div class="sl43-batch"><div class="sl43-batch-head"><div><div class="sl43-batch-date">'+I('calendar',12)+H(batchTime(b))+'</div><div class="sl43-batch-sub">'+H((b.items||[]).length+' '+S('รายการ','items'))+'</div></div><b>'+money(b._sl43Total||0)+'</b></div>'+(b.items||[]).map(itemRow).join('')+'</div>'}function monthCard(g){var open=!!expanded[g.key];return'<div class="sl43-month-card '+(open?'expanded':'')+'"><button class="sl43-month-head" type="button" onclick="sl43ToggleHistoryMonth(\''+g.key+'\')"><span class="sl43-chevron">'+I('chevronRight',14)+'</span><span><span class="sl43-month-name">'+H(pLabel(g.month,g.year))+'</span><span class="sl43-month-meta"><span>'+H(g.itemCount+' '+S('รายการ','items'))+'</span><span>'+H(g.batches.length+' '+S('รอบซื้อ','batches'))+'</span></span></span><span class="sl43-month-total">'+money(g.total)+'</span></button><div class="sl43-month-detail">'+g.batches.map(batchCard).join('')+'</div></div>'}function renderHistoryV43(){var st=getState(),f=loadFilter(),groups=groupData(),total=groups.reduce(function(s,g){return s+g.total},0),count=groups.reduce(function(s,g){return s+g.itemCount},0);var html=renderHeaderV43()+'<div class="sl43-history-shell"><div class="sl43-history-toolbar"><div><div class="sl43-history-title">'+I('package',16)+H(S('รายการที่ซื้อแล้ว','Purchased'))+'</div><div class="sl43-history-note">'+H(S('เลือกช่วงเดือน/ปี แล้วแตะชื่อเดือนเพื่อหุบหรือขยายรายการ','Filter by month/year, then tap a month to expand or collapse.'))+'</div></div><div class="search-bar" style="margin:0"><span class="search-icon">'+I('search',14)+'</span><input class="search-input" style="background:rgba(255,255,255,.78)" placeholder="'+H(S('ค้นหารายการที่ซื้อแล้ว','Search purchased items'))+'" value="'+H(st.historySearchV43||'')+'" oninput="sl43SetHistorySearch(this.value)">'+((st.historySearchV43||'')?'<button class="search-clear" type="button" onclick="sl43SetHistorySearch(\'\')">'+I('x',12)+'</button>':'')+'</div><div class="sl43-filter-grid"><div class="sl43-field"><label>'+H(S('ตั้งแต่','From'))+'</label><div class="sl43-pair"><select class="sl43-select" onchange="sl43SetHistoryRange(\'fromMonth\',this.value)">'+monthOptions(f.fromMonth)+'</select><select class="sl43-select" onchange="sl43SetHistoryRange(\'fromYear\',this.value)">'+yearOptions(f.fromYear)+'</select></div></div><div class="sl43-field"><label>'+H(S('ถึง','To'))+'</label><div class="sl43-pair"><select class="sl43-select" onchange="sl43SetHistoryRange(\'toMonth\',this.value)">'+monthOptions(f.toMonth)+'</select><select class="sl43-select" onchange="sl43SetHistoryRange(\'toYear\',this.value)">'+yearOptions(f.toYear)+'</select></div></div></div><div class="sl43-action-row"><button class="sl43-btn primary" onclick="sl43ExpandAllHistory()">'+I('chevronDown',13)+H(S('ขยายทุกเดือน','Expand all months'))+'</button><button class="sl43-btn" onclick="sl43CollapseAllHistory()">'+I('chevronRight',13)+H(S('ย่อทุกเดือน','Collapse all months'))+'</button><button class="sl43-btn" onclick="sl43ResetHistoryFilter()">'+I('refresh',13)+H(S('ล้างตัวกรอง','Clear filter'))+'</button></div></div><div class="sl43-summary"><div class="sl43-kpi"><small>'+H(S('เดือนที่พบ','Months'))+'</small><b>'+groups.length+'</b></div><div class="sl43-kpi"><small>'+H(S('รายการ','Items'))+'</small><b>'+count+'</b></div><div class="sl43-kpi"><small>'+H(S('ยอดรวม','Total'))+'</small><b>'+money(total)+'</b></div></div>';if(!groups.length)html+='<div class="sl43-empty"><div class="sl43-empty-icon">'+I('search',26)+'</div><div class="sl43-empty-title">'+H(S('ไม่พบรายการที่ซื้อแล้ว','No purchased items found'))+'</div><div>'+H(S('ลองเปลี่ยนช่วงเดือน/ปี หรือล้างคำค้นหา','Try changing the month/year range or clearing search.'))+'</div></div>';else html+='<div class="sl43-month-list">'+groups.map(monthCard).join('')+'</div>';html+='</div><div class="footer">'+H(S('แตะชื่อเดือนเพื่อหุบ/ขยายรายการซื้อของเดือนนั้น','Tap a month to expand/collapse its purchases.'))+'</div>';var app=document.getElementById('app');if(app)app.innerHTML=html}window.sl43ToggleHistoryMonth=function(k){expanded[k]=!expanded[k];renderHistoryV43()};window.sl43ExpandAllHistory=function(){groupData().forEach(function(g){expanded[g.key]=true});renderHistoryV43()};window.sl43CollapseAllHistory=function(){groupData().forEach(function(g){expanded[g.key]=false});renderHistoryV43()};window.sl43SetHistoryRange=function(k,v){var f=loadFilter();f[k]=+v;saveFilter();renderHistoryV43()};window.sl43ResetHistoryFilter=function(){var st=getState();st.historyFilterV43=defaultFilter();st.historySearchV43='';saveFilter();renderHistoryV43()};window.sl43SetHistorySearch=function(v){var st=getState();st.historySearchV43=v||'';clearTimeout(searchTimer);searchTimer=setTimeout(function(){if(getState().tab==='history')renderHistoryV43();try{if(typeof saveDebounced==='function')saveDebounced()}catch(e){}},120)};window.renderHistoryTab=renderHistoryV43;try{renderHistoryTab=renderHistoryV43}catch(e){}var oldRenderApp=window.renderApp;if(typeof oldRenderApp==='function'){window.renderApp=function(){return oldRenderApp.apply(this,arguments)};try{renderApp=window.renderApp}catch(e){}}var oldSetTab=window.setTab;if(typeof oldSetTab==='function'){window.setTab=function(tab){var st=getState();st.tab=tab;if(tab==='history')renderHistoryV43();else if(typeof window.renderApp==='function')window.renderApp();try{if(typeof saveDebounced==='function')saveDebounced()}catch(e){}};try{setTab=window.setTab}catch(e){}}var oldSetLang=window.setLang;if(typeof oldSetLang==='function'){window.setLang=function(next){var st=getState();st.lang=next;if(st.tab==='history')renderHistoryV43();else if(typeof window.renderApp==='function')window.renderApp();try{if(typeof saveDebounced==='function')saveDebounced()}catch(e){}};try{setLang=window.setLang}catch(e){}}})();

<script id="sl-v45-spreadsheet-io">
(function(){
  'use strict';
  if (window.__spendLabV45SpreadsheetIO) return;
  window.__spendLabV45SpreadsheetIO = true;

  function getState(){ try { return state; } catch(e) { return window.state || {}; } }
  function lang(){ var st=getState(); return st && st.lang === 'en' ? 'en' : 'th'; }
  function L(th,en){ return lang()==='en' ? en : th; }
  function iconSafe(name,size){ try { return icon(name,size||14); } catch(e) { return ''; } }
  function escHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function today(){ return new Date().toISOString().slice(0,10); }
  function num(v){ var n = parseFloat(String(v==null?'':v).replace(/,/g,'')); return isFinite(n) ? n : 0; }
  function bool(v){ return /^(1|true|yes|y|เลือก|selected)$/i.test(String(v==null?'':v).trim()); }
  function csvCell(v){
    var s = String(v==null?'':v);
    if(/[",\n\r]/.test(s)) s = '"' + s.replace(/"/g,'""') + '"';
    return s;
  }
  function downloadFile(filename, content, mime){
    var blob = new Blob([content], {type:mime || 'text/plain;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 500);
    try { showSaveStatus(); } catch(e) {}
  }

  function fullBackupData(){
    var st = getState();
    return {
      version: 'spendlab-v45-spreadsheet-io',
      exportedAt: new Date().toISOString(),
      lang: st.lang,
      items: st.items || [], selected: st.selected || [], priceMode: st.priceMode,
      fixed: st.fixed || [], incomeSources: st.incomeSources || [], savings: st.savings || 0, emergency: st.emergency || 0,
      salary: st.salary || 0, hideIncome: !!st.hideIncome, incomePin: st.incomePin || '', resetCode: st.resetCode || '',
      pinRecoveryCodes: st.pinRecoveryCodes || '', pinRecoveryHint: st.pinRecoveryHint || '',
      planMonth: st.planMonth, planYear: st.planYear,
      itemSearch: st.itemSearch || '', itemSort: st.itemSort || 'wishlist', itemPageMode: st.itemPageMode || 'paged', itemPages: st.itemPages || {},
      categoryPage: st.categoryPage || 0, bulkCategoryEdit: !!st.bulkCategoryEdit,
      catLabels: st.catLabels || {}, catCustom: st.catCustom || {}, categoryOrder: st.categoryOrder || [], collapsedCats: st.collapsedCats || {},
      historySearch: st.historySearch || '',
      overviewMode: st.overviewMode || 'monthly', overviewYear: st.overviewYear || 'all', overviewMonth: st.overviewMonth || 'all',
      overviewPage: st.overviewPage || 0, overviewExpanded: st.overviewExpanded || {}, overviewSearch: st.overviewSearch || '',
      profileAge: st.profileAge || '', profileOccupation: st.profileOccupation || '',
      bkkOfficialCategory: st.bkkOfficialCategory || 'total', bkkOfficialCompareYear: st.bkkOfficialCompareYear,
      appThemeTone: st.appThemeTone || 'skyBlossom', tax: st.tax || {}, purchases: st.purchases || []
    };
  }

  var CSV_COLUMNS = ['sheet','id','date','periodMonth','periodYear','category','name','note','priceDeep','priceAvg','price','selected','amount','type','key','value','originalId','color','priceMode'];
  function dataRows(){
    var st = getState(), rows = [], selected = new Set((st.selected || []).map(String));
    var settings = {
      lang: st.lang, priceMode: st.priceMode, salary: st.salary, savings: st.savings, emergency: st.emergency,
      planMonth: st.planMonth, planYear: st.planYear, appThemeTone: st.appThemeTone,
      profileAge: st.profileAge, profileOccupation: st.profileOccupation
    };
    Object.keys(settings).forEach(function(k){ rows.push({sheet:'settings',key:k,value:settings[k]}); });
    (st.items || []).forEach(function(it){ rows.push({sheet:'wishlist',id:it.id,category:it.cat,name:it.name,note:it.note,priceDeep:it.deep,priceAvg:it.avg,selected:selected.has(String(it.id))?'TRUE':'FALSE'}); });
    (st.fixed || []).forEach(function(f){ rows.push({sheet:'fixed',id:f.id,name:f.name,amount:f.amount,type:f.type || '',color:f.color || ''}); });
    (st.incomeSources || []).forEach(function(i){ rows.push({sheet:'income',id:i.id,name:i.name,amount:i.amount,type:i.type || ''}); });
    (st.purchases || []).forEach(function(batch){
      var d = new Date(batch.date || Date.now());
      var pm = batch.periodMonth || (isNaN(d.getTime()) ? '' : d.getMonth()+1);
      var py = batch.periodYear || (isNaN(d.getTime()) ? '' : d.getFullYear());
      (batch.items || []).forEach(function(it){ rows.push({sheet:'purchased',id:batch.id,date:batch.date,periodMonth:pm,periodYear:py,category:it.cat,name:it.name,note:it.note,price:it.price,originalId:it.originalId,priceMode:batch.priceMode}); });
    });
    var tax = st.tax || {};
    Object.keys(tax).forEach(function(k){ rows.push({sheet:'tax',key:k,value:tax[k]}); });
    return rows;
  }
  function rowsToCsv(rows){
    var lines = [CSV_COLUMNS.map(csvCell).join(',')];
    rows.forEach(function(r){ lines.push(CSV_COLUMNS.map(function(c){ return csvCell(r[c]); }).join(',')); });
    return '\ufeff' + lines.join('\n');
  }
  function exportCsv(){
    downloadFile('spendlab-data-' + today() + '.csv', rowsToCsv(dataRows()), 'text/csv;charset=utf-8');
    closeDataPanel();
  }
  function tableHtml(rows){
    var th = CSV_COLUMNS.map(function(c){return '<th>'+escHtml(c)+'</th>';}).join('');
    var trs = rows.map(function(r){ return '<tr>' + CSV_COLUMNS.map(function(c){ return '<td>'+escHtml(r[c])+'</td>'; }).join('') + '</tr>'; }).join('\n');
    return '<table data-sheet="spendlab-data"><caption>spendlab-data</caption><thead><tr>'+th+'</tr></thead><tbody>'+trs+'</tbody></table>';
  }
  function exportExcel(){
    var html = '<!doctype html><html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif}table{border-collapse:collapse}caption{text-align:left;font-weight:bold;font-size:18px;margin:12px 0}th,td{border:1px solid #bbb;padding:5px;mso-number-format:"\\@"}th{background:#eee}</style></head><body><h2>SpendLab Data Export</h2><p>Open in Excel. To import back into SpendLab, keep the header row unchanged.</p>'+tableHtml(dataRows())+'</body></html>';
    downloadFile('spendlab-data-' + today() + '.xls', '\ufeff' + html, 'application/vnd.ms-excel;charset=utf-8');
    closeDataPanel();
  }
  function exportJsonBackup(){
    downloadFile('spendlab-full-backup-' + today() + '.json', JSON.stringify(fullBackupData(), null, 2), 'application/json;charset=utf-8');
    closeDataPanel();
  }

  function parseCsv(text){
    text = String(text || '').replace(/^\ufeff/, '');
    var rows=[], row=[], field='', q=false;
    for(var i=0;i<text.length;i++){
      var ch=text[i], next=text[i+1];
      if(q){
        if(ch==='"' && next==='"'){ field+='"'; i++; }
        else if(ch==='"'){ q=false; }
        else field+=ch;
      } else {
        if(ch==='"') q=true;
        else if(ch===','){ row.push(field); field=''; }
        else if(ch==='\n') { row.push(field); rows.push(row); row=[]; field=''; }
        else if(ch==='\r') {}
        else field+=ch;
      }
    }
    row.push(field); rows.push(row);
    rows = rows.filter(function(r){ return r.some(function(c){ return String(c).trim() !== ''; }); });
    if(!rows.length) return [];
    var headers = rows.shift().map(function(h){ return String(h || '').trim(); });
    return rows.map(function(r){ var o={}; headers.forEach(function(h,idx){ o[h]=r[idx] == null ? '' : r[idx]; }); return o; });
  }
  function parseHtmlTables(text){
    var doc = new DOMParser().parseFromString(String(text||''), 'text/html');
    var rows = [];
    doc.querySelectorAll('table').forEach(function(table){
      var trs = Array.from(table.querySelectorAll('tr'));
      if(!trs.length) return;
      var headers = Array.from(trs[0].querySelectorAll('th,td')).map(function(c){ return c.textContent.trim(); });
      trs.slice(1).forEach(function(tr){
        var cells = Array.from(tr.querySelectorAll('td,th')).map(function(c){ return c.textContent; });
        if(!cells.some(function(c){ return String(c).trim(); })) return;
        var o={}; headers.forEach(function(h,i){ o[h]=cells[i] || ''; });
        if(!o.sheet && table.dataset.sheet) o.sheet = table.dataset.sheet;
        rows.push(o);
      });
    });
    return rows;
  }
  function getVal(o, keys){
    for(var i=0;i<keys.length;i++){ if(o[keys[i]] != null && String(o[keys[i]]).trim() !== '') return o[keys[i]]; }
    return '';
  }
  function rowsToImportData(rows){
    var data = { version:'spendlab-csv-import-v45', importedAt:new Date().toISOString() };
    var hasItems=false, hasFixed=false, hasIncome=false, hasPurch=false, hasTax=false, hasSettings=false;
    var items=[], fixed=[], income=[], selected=[], tax={}, settings={}, batches={};
    rows.forEach(function(r,idx){
      var sheet = String(getVal(r,['sheet','Sheet','type','Type']) || '').trim().toLowerCase();
      if(!sheet) return;
      if(sheet === 'items') sheet = 'wishlist';
      if(sheet === 'purchases') sheet = 'purchased';
      if(sheet === 'income sources') sheet = 'income';
      if(sheet === 'taxes') sheet = 'tax';
      if(sheet === 'setting') sheet = 'settings';
      if(sheet === 'wishlist'){
        hasItems=true;
        var id = getVal(r,['id','ID']) || (Date.now()+idx);
        var item = {
          id: isNaN(Number(id)) ? id : Number(id),
          name: String(getVal(r,['name','Name','item','Item']) || '').trim(),
          note: String(getVal(r,['note','Note']) || ''),
          cat: String(getVal(r,['category','cat','Category']) || 'should').trim() || 'should',
          deep: num(getVal(r,['priceDeep','deep','Deep','Best Price'])),
          avg: num(getVal(r,['priceAvg','avg','Avg','Average Price']))
        };
        if(item.name) items.push(item);
        if(bool(getVal(r,['selected','Selected']))) selected.push(item.id);
      } else if(sheet === 'fixed'){
        hasFixed=true;
        fixed.push({
          id: getVal(r,['id','ID']) || ('f-import-' + idx),
          name: String(getVal(r,['name','Name']) || '').trim(),
          amount: num(getVal(r,['amount','Amount','price','Price'])),
          type: String(getVal(r,['type','Type']) || ''),
          color: String(getVal(r,['color','Color']) || '')
        });
      } else if(sheet === 'income'){
        hasIncome=true;
        income.push({
          id: getVal(r,['id','ID']) || ('i-import-' + idx),
          name: String(getVal(r,['name','Name']) || '').trim(),
          amount: num(getVal(r,['amount','Amount','price','Price'])),
          type: String(getVal(r,['type','Type']) || '')
        });
      } else if(sheet === 'purchased'){
        hasPurch=true;
        var date = String(getVal(r,['date','Date']) || new Date().toISOString());
        var idb = String(getVal(r,['id','batchId','Batch ID']) || ('batch-' + date));
        if(!batches[idb]) batches[idb] = { id:idb, date:date, priceMode:String(getVal(r,['priceMode','Price Mode']) || 'deep'), periodMonth:num(getVal(r,['periodMonth','month','Month'])) || undefined, periodYear:num(getVal(r,['periodYear','year','Year'])) || undefined, items:[] };
        batches[idb].items.push({
          name: String(getVal(r,['name','Name','item','Item']) || '').trim(),
          note: String(getVal(r,['note','Note']) || ''),
          cat: String(getVal(r,['category','cat','Category']) || 'should').trim() || 'should',
          price: num(getVal(r,['price','Price','amount','Amount'])),
          originalId: getVal(r,['originalId','Original ID']) || undefined
        });
      } else if(sheet === 'tax'){
        hasTax=true;
        var kt = String(getVal(r,['key','Key','name','Name']) || '').trim();
        if(kt) tax[kt] = getVal(r,['value','Value','amount','Amount']);

      }
    });

    if(hasIncome) data.incomeSources = income.filter(function(x){ return x.name; });
    if(hasPurch) data.purchases = Object.keys(batches).map(function(k){ return batches[k]; }).filter(function(b){ return b.items.length; });

      '<div class="sl45-data-card"><b>'+iconSafe('save',15)+escHtml(L('สำรองเต็มระบบ JSON','Full JSON Backup'))+'</b><span>'+escHtml(L('ใช้เมื่อต้องการย้ายเครื่อง/กู้คืนข้อมูลทั้งหมดแบบปลอดภัยที่สุด','Best for moving devices or restoring the full app state safely.'))+'</span><button class="sl45-data-btn soft" onclick="exportJsonBackup()" type="button">'+iconSafe('save',13)+escHtml(L('สำรอง JSON','Backup JSON'))+'</button><button class="sl45-data-btn soft" onclick="closeDataPanel(); triggerImport();" type="button">'+iconSafe('upload',13)+escHtml(L('กู้คืน JSON','Restore JSON'))+'</button></div>'+

<script id="sl-v46-search-fixed">
(function(){
  'use strict';
  if (window.__spendLabV46SearchFixed) return;
  window.__spendLabV46SearchFixed = true;

  function getStateSafe(){
    try { return window.state || state; } catch(e) { return window.state || null; }
  }
  function saveLater(){
    try { if (typeof window.saveDebounced === 'function') window.saveDebounced(); else if (typeof saveDebounced === 'function') saveDebounced(); } catch(e) {}
  }
  function renderAppSafe(){
    try { if (typeof window.renderApp === 'function') window.renderApp(); else if (typeof renderApp === 'function') renderApp(); } catch(e) { console.error('[v46 renderApp]', e); }
  }
  function renderModalSafe(){
    try { if (typeof window.renderModal === 'function') window.renderModal(); else if (typeof renderModal === 'function') renderModal(); } catch(e) { console.error('[v46 renderModal]', e); }
  }
  function renderHistorySafe(){
    try {
      if (typeof window.renderHistoryTab === 'function') window.renderHistoryTab();
      else if (typeof renderHistoryTab === 'function') renderHistoryTab();
      else renderAppSafe();
    } catch(e) { console.error('[v46 renderHistory]', e); renderAppSafe(); }
  }
  function focusInput(selector, value){
    setTimeout(function(){
      try {
        var el = document.querySelector(selector);
        if (!el) return;
        el.focus({ preventScroll: true });
        if (typeof value === 'string' && el.value !== value) el.value = value;
        var len = el.value ? el.value.length : 0;
        if (el.setSelectionRange) el.setSelectionRange(len, len);
      } catch(e) {}
    }, 0);
  }

  var historyTypingTimer = null;
  window.sl43SetHistorySearch = function(value){
    var st = getStateSafe();
    if (!st) return;
    st.historySearchV43 = value || '';
    clearTimeout(historyTypingTimer);

    var doRender = function(){
      if ((getStateSafe() || {}).tab === 'history') {
        renderHistorySafe();
        focusInput('.sl43-history-shell .search-bar input.search-input, #history-search', st.historySearchV43 || '');
      }
      saveLater();
    };

    // Empty query should clear immediately. Non-empty query waits until typing pauses,
    // preventing the input from being destroyed/recreated on every Thai keystroke.
    if (!st.historySearchV43) doRender();
    else historyTypingTimer = setTimeout(doRender, 650);
  };
  try { sl43SetHistorySearch = window.sl43SetHistorySearch; } catch(e) {}

  var legacyHistoryTimer = null;
  window.setHistorySearch = function(value){
    var st = getStateSafe();
    if (!st) return;
    st.historySearch = value || '';
    clearTimeout(legacyHistoryTimer);
    var doRender = function(){
      renderAppSafe();
      focusInput('#history-search', st.historySearch || '');
      saveLater();
    };
    if (!st.historySearch) doRender();
    else legacyHistoryTimer = setTimeout(doRender, 650);
  };
  try { setHistorySearch = window.setHistorySearch; } catch(e) {}

  var overviewTypingTimer = null;
  window.setOverviewSearch = function(value){
    var st = getStateSafe();
    if (!st) return;
    st.overviewSearch = value || '';
    st.overviewPage = 0;
    clearTimeout(overviewTypingTimer);
    var doRender = function(){
      renderAppSafe();
      focusInput('#overview-search', st.overviewSearch || '');
      saveLater();
    };
    if (!st.overviewSearch) doRender();
    else overviewTypingTimer = setTimeout(doRender, 450);
  };
  try { setOverviewSearch = window.setOverviewSearch; } catch(e) {}

  function periodIndexSafe(month, year){
    try { if (typeof window.periodIndex === 'function') return window.periodIndex(month, year); } catch(e) {}
    try { if (typeof periodIndex === 'function') return periodIndex(month, year); } catch(e) {}
    return (+year || 0) * 12 + (+month || 0);
  }
  function inferEndYear(modal){
    if (!modal) return null;
    if (modal.endYear) return +modal.endYear;
    var startYear = +modal.startYear || new Date().getFullYear();
    var startMonth = +modal.startMonth || 1;
    var endMonth = +modal.endMonth || 0;
    // When the user only taps an end month, use start year by default.
    // If that would place the end before the start, move it to next year.
    if (endMonth && endMonth < startMonth) return startYear + 1;
    return startYear;
  }

  window.setFixedScheduleTarget = function(target){
    var st = getStateSafe();
    if (!st || !st.modal || st.modal.type !== 'fixedSchedule') return;
    st.modal.target = target;
    var month = target === 'end' ? st.modal.endMonth : st.modal.startMonth;
    var year = target === 'end' ? (st.modal.endYear || inferEndYear(st.modal)) : st.modal.startYear;
    st.modal.pickerMonth = month || st.modal.startMonth || new Date().getMonth() + 1;
    st.modal.pickerYear = year || st.modal.startYear || new Date().getFullYear();
    st.modal.showYearGrid = false;
    st.modal.yearGridStart = st.modal.pickerYear - 5;
    renderModalSafe();
  };
  try { setFixedScheduleTarget = window.setFixedScheduleTarget; } catch(e) {}

  window.pickFixedScheduleMonth = function(month){
    var st = getStateSafe();
    if (!st || !st.modal || st.modal.type !== 'fixedSchedule') return;
    month = +month;
    if (st.modal.target === 'end') {
      st.modal.endMonth = month;
      if (!st.modal.endYear) st.modal.endYear = inferEndYear(st.modal);
      st.modal.pickerYear = st.modal.endYear;
    } else {
      st.modal.startMonth = month;
      if (!st.modal.startYear) st.modal.startYear = st.modal.pickerYear || new Date().getFullYear();
    }
    st.modal.pickerMonth = month;
    renderModalSafe();
  };
  try { pickFixedScheduleMonth = window.pickFixedScheduleMonth; } catch(e) {}

  window.saveFixedSchedule = function(){
    var st = getStateSafe();
    if (!st || !st.modal || st.modal.type !== 'fixedSchedule') return;
    var f = (st.fixed || []).find(function(x){ return x.id === st.modal.fixedId; });
    if (!f) return;

    var start = { month: +st.modal.startMonth, year: +st.modal.startYear };
    var hasEndMonth = !!st.modal.endMonth;
    var end = hasEndMonth ? { month: +st.modal.endMonth, year: inferEndYear(st.modal) } : null;

    if (!start.month || !start.year) {
      st.modal.error = st.lang === 'en' ? 'Please choose a start month.' : 'กรุณาเลือกเดือนเริ่มต้น';
      renderModalSafe();
      return;
    }
    if (end && periodIndexSafe(end.month, end.year) < periodIndexSafe(start.month, start.year)) {
      // Final safety: if the inferred end is still before the start, push it to next year.
      end.year = start.year + 1;
    }

    f.startMonth = start.month;
    f.startYear = start.year;
    f.endMonth = end ? end.month : null;
    f.endYear = end ? end.year : null;
    st.modal = null;
    renderModalSafe();
    renderAppSafe();
    saveLater();
  };
  try { saveFixedSchedule = window.saveFixedSchedule; } catch(e) {}
})();
</script>
