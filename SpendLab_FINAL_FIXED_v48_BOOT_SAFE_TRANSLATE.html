<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SpendLab">
<meta name="theme-color" content="#f7f4ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<title>SpendLab by EverBlue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Quicksand:wght@500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdfcfb;
    --text: #2e2a33;
    --text-soft: #6b6570;
    --text-faint: #a8a1ad;
    --border: rgba(170, 160, 180, 0.2);
    --border-strong: rgba(170, 160, 180, 0.32);

    --pink: #d89aae;
    --pink-surface: rgba(249, 215, 228, 0.5);
    --pink-soft: rgba(216, 154, 174, 0.1);

    --purple: #a595c4;
    --purple-surface: rgba(225, 215, 245, 0.5);
    --purple-soft: rgba(165, 149, 196, 0.1);

    --blue: #8ca7c9;
    --blue-surface: rgba(210, 225, 245, 0.5);
    --blue-soft: rgba(140, 167, 201, 0.1);

    --yellow: #d0b070;
    --yellow-surface: rgba(252, 240, 205, 0.5);
    --yellow-soft: rgba(208, 176, 112, 0.1);

    --sage: #8fa886;
    --sage-surface: rgba(220, 235, 210, 0.5);
    --sage-soft: rgba(143, 168, 134, 0.1);

    --coral: #d2887a;
    --coral-surface: rgba(250, 218, 210, 0.5);
    --coral-soft: rgba(210, 136, 122, 0.1);

    --shadow-sm: 0 1px 2px rgba(80, 60, 90, 0.04), 0 2px 10px rgba(80, 60, 90, 0.03);
    --shadow-md: 0 4px 16px rgba(80, 60, 90, 0.06), 0 8px 32px rgba(80, 60, 90, 0.04);
    --shadow-lg: 0 12px 48px rgba(80, 60, 90, 0.12);

    --font: 'Sarabun', -apple-system, system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    font-family: var(--font); color: var(--text);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    overflow-x: hidden;
    background:
      linear-gradient(rgba(250,249,255,.70), rgba(255,252,255,.82)),
      url('<BASE64_BG_REMOVED>') no-repeat center top / min(1180px, 155vw) auto,
      radial-gradient(ellipse 85% 62% at 50% -10%, rgba(255,255,255,0.92) 0%, rgba(245,244,255,0.72) 42%, transparent 72%),
      radial-gradient(ellipse 80% 52% at 0% 10%, rgba(186,222,255,0.42) 0%, transparent 60%),
      radial-gradient(ellipse 65% 48% at 100% 28%, rgba(236,207,255,0.38) 0%, transparent 62%),
      radial-gradient(ellipse 90% 70% at 50% 100%, rgba(214,232,255,0.45) 0%, transparent 66%),
      linear-gradient(180deg, #fbfbff 0%, #f7f4ff 46%, #fffafd 100%);
    background-attachment: fixed, fixed, fixed, fixed, fixed, fixed, fixed;
    min-height: 100vh;
  }

  body::before,
  body::after {
    content: "";
    position: fixed;
    z-index: -2;
    pointer-events: none;
    opacity: .82;
    filter: blur(.2px) saturate(1.28);
  }

  body::before {
    width: min(58vw, 360px);
    height: 118vh;
    left: -170px;
    top: -90px;
    border-radius: 46% 54% 42% 58% / 34% 44% 56% 66%;
    transform: rotate(16deg);
    background:
      linear-gradient(115deg, rgba(255,255,255,.66), rgba(151,209,255,.28) 17%, rgba(224,190,255,.36) 36%, rgba(255,178,230,.22) 54%, rgba(151,221,255,.32) 76%, rgba(255,255,255,.6)),
      radial-gradient(circle at 76% 18%, rgba(255,255,255,.95), transparent 18%),
      radial-gradient(circle at 74% 74%, rgba(115,183,255,.45), transparent 28%);
    box-shadow:
      inset 18px 0 36px rgba(255,255,255,.78),
      inset -18px 0 34px rgba(120,176,255,.26),
      0 0 54px rgba(183,199,255,.34);
  }

  body::after {
    width: min(72vw, 520px);
    height: 42vh;
    right: -220px;
    bottom: -80px;
    border-radius: 999px;
    transform: rotate(-18deg);
    background:
      linear-gradient(105deg, rgba(255,255,255,.18), rgba(150,209,255,.34), rgba(229,191,255,.34), rgba(255,204,238,.24), rgba(255,255,255,.38)),
      radial-gradient(circle at 22% 54%, rgba(255,255,255,.82), transparent 16%);
    box-shadow:
      inset 0 18px 34px rgba(255,255,255,.74),
      inset 0 -16px 42px rgba(109,165,255,.2),
      0 0 58px rgba(180,194,255,.28);
  }

  .app { max-width: 560px; margin: 0 auto; padding: 22px 0 100px; position: relative; }

  .num { font-feature-settings: "tnum" 1; letter-spacing: -0.01em; }

  .icon { display: inline-block; vertical-align: middle; flex-shrink: 0; }
  .icon-stroke { stroke-linecap: round; stroke-linejoin: round; }

  /* ───── HEADER ───── */
  .header {
    position: sticky; top: 10px; z-index: 20;
    margin: 0 10px 14px;
    background: linear-gradient(135deg, rgba(255,255,255,0.56), rgba(245,244,255,0.34));
    backdrop-filter: blur(30px) saturate(1.55);
    -webkit-backdrop-filter: blur(30px) saturate(1.55);
    border: 1px solid rgba(255,255,255,0.58);
    border-radius: 28px;
    padding: 24px 14px 12px;
    box-shadow: 0 18px 55px rgba(112,118,178,0.12), inset 0 1px 0 rgba(255,255,255,0.75);
    overflow: hidden;
  }
  .header::before {
    content: "";
    position: absolute;
    left: -12%; top: -115%;
    width: 74%; height: 220%;
    border-radius: 999px;
    transform: rotate(21deg);
    background:
      linear-gradient(120deg, rgba(255,255,255,.42), rgba(128,202,255,.18), rgba(232,194,255,.28), rgba(255,255,255,.22)),
      radial-gradient(circle at 72% 22%, rgba(255,255,255,.72), transparent 18%);
    box-shadow: inset 16px 0 32px rgba(255,255,255,.58), inset -14px 0 28px rgba(117,172,255,.18);
    opacity: .62;
    pointer-events: none;
  }
  .brand-row { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 0; position: relative; z-index: 1; }
  .brand-stack { display:flex; flex-direction:column; gap:0; line-height:1; min-width:0; position:relative; padding-right:0; align-items:center; margin: 4px 0 2px; }
  .brand {
    font-family: 'Manrope', var(--font);
    font-weight: 800;
    font-size: clamp(48px, 12.5vw, 76px);
    letter-spacing: -0.072em;
    line-height: .88;
    position: relative;
    filter:
      drop-shadow(0 12px 22px rgba(114, 144, 222, 0.22))
      drop-shadow(0 2px 2px rgba(255,255,255,0.65));
    white-space: nowrap;
    isolation: isolate;
  }
  .brand span {
    display: inline-block;
    position: relative;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    -webkit-text-stroke: .55px rgba(255,255,255,.76);
    text-shadow:
      0 1px 0 rgba(255,255,255,.9),
      0 0 1px rgba(255,255,255,.95),
      0 0 12px rgba(127,196,255,.32),
      0 0 22px rgba(218,180,255,.26),
      0 9px 24px rgba(119,126,205,.18);
  }
  .brand .brand-spend {
    background-image:
      linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(222,244,255,.92) 18%, rgba(104,190,255,.86) 42%, rgba(194,230,255,.64) 67%, rgba(255,255,255,.96) 100%),
      linear-gradient(112deg, #e9fbff 0%, #82ceff 32%, #f3fbff 50%, #a2d8ff 72%, #ffffff 100%);
  }
  .brand .brand-lab {
    margin-left: .085em;
    background-image:
      linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(243,229,255,.92) 19%, rgba(202,155,255,.8) 44%, rgba(255,214,245,.62) 68%, rgba(255,255,255,.96) 100%),
      linear-gradient(112deg, #fbf6ff 0%, #d5b7ff 30%, #fff4fb 50%, #efbce9 74%, #ffffff 100%);
  }
  .brand::before {
    content: "";
    position: absolute;
    left: 2%; right: 0; top: 2%; height: 42%;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.12));
    filter: blur(.25px);
    mix-blend-mode: screen;
    pointer-events: none;
    opacity: .82;
    z-index: 2;
  }
  .brand::after {
    content: "";
    position: absolute;
    inset: -12% -3% -6%;
    border-radius: 999px;
    background:
      radial-gradient(ellipse at 14% 18%, rgba(255,255,255,.78), transparent 24%),
      linear-gradient(115deg, transparent 0%, rgba(255,255,255,.42) 34%, transparent 52%, rgba(182,218,255,.22) 76%, transparent 100%);
    mix-blend-mode: overlay;
    pointer-events: none;
    opacity: .62;
    z-index: 3;
  }
  .brand-by {
    font-family:'Quicksand', 'Nunito', 'Arial Rounded MT Bold', var(--font);
    font-size: clamp(12px, 3.1vw, 17px);
    color: rgba(143, 132, 214, 0.48);
    font-weight: 600;
    letter-spacing: .005em;
    text-transform:none;
    margin-top: 6px;
    align-self:flex-end;
    transform: translateX(13%);
    text-shadow:
      0 1px 0 rgba(255,255,255,.85),
      0 6px 18px rgba(156,143,216,.14);
  }
  .lang-toggle { display:flex; gap:2px; background:rgba(255,255,255,.62); border:1px solid rgba(196,190,232,.38); border-radius:999px; padding:3px; box-shadow: inset 0 1px 0 rgba(255,255,255,.7); }
  .lang-btn { border:0; border-radius:999px; padding:6px 9px; background:transparent; color:var(--text-faint); font-family:inherit; font-size:10px; font-weight:800; cursor:pointer; }
  .lang-btn.active { color:#fff; background:linear-gradient(135deg,#a9ccff,#b69cff,#f1bfe8); box-shadow:0 7px 16px rgba(158,134,220,.20); }

  .controls { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; width: 100%; }
  .save-status {
    font-size: 11px; color: var(--sage); font-weight: 500;
    opacity: 0; transition: opacity .3s;
    display: flex; align-items: center; gap: 4px;
  }
  .reset-btn {
    display: flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.55); color: var(--text-soft);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 5px 9px; font-size: 10px; cursor: pointer;
    font-family: inherit; font-weight: 500;
    white-space: nowrap;
  }

  /* ───── TABS ───── */
  .tabs {
    display: flex; gap: 4px; margin-top: 12px;
    background: rgba(255,255,255,0.52);
    border: 1px solid rgba(196,190,232,.38);
    border-radius: 999px; padding: 5px;
    position: relative; z-index: 1;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.68);
  }
  .tab {
    flex: 1; padding: 10px 0; border-radius: 999px; border: none;
    font-family: inherit; font-size: 13px; font-weight: 500;
    background: transparent; color: var(--text-soft); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all .2s;
    letter-spacing: 0.01em;
  }
  .tab.active { background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(230,224,255,.72)); color: #5650b9; box-shadow: 0 8px 20px rgba(126,116,198,.14); font-weight: 700; }
  .tab-badge {
    font-size: 10px; background: var(--purple); color: #fff;
    padding: 1px 6px; border-radius: 999px; font-weight: 600; margin-left: 2px;
  }
  .tab.active .tab-badge { background: var(--purple); }
  .tab:not(.active) .tab-badge { background: var(--text-faint); }

  /* ───── MODE TOGGLE ───── */
  .mode-toggle {
    display: flex; gap: 3px; margin-top: 10px; margin-bottom: 12px;
    background: rgba(255,255,255,0.4);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 3px;
  }
  .mode-btn {
    flex: 1; padding: 7px 0; border-radius: 10px; border: none;
    font-family: inherit; font-size: 12px; font-weight: 500;
    background: transparent; color: var(--text-faint); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all .2s;
  }
  .mode-btn.active { background: rgba(255,255,255,0.95); box-shadow: var(--shadow-sm); }
  .mode-btn.active.deep { color: var(--coral); }
  .mode-btn.active.avg { color: var(--blue); }

  /* ───── PERIOD PICKER ───── */
  .period-panel {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    margin-bottom: 12px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.72), rgba(249, 215, 228, 0.24)),
      radial-gradient(ellipse 90% 120% at 100% 0%, rgba(210, 225, 245, 0.35), transparent 58%);
    border: 1px solid var(--border);
    border-radius: 18px; padding: 9px 10px;
    box-shadow: var(--shadow-sm);
  }
  .period-label {
    font-size: 12px; color: var(--text-soft); font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .period-controls {
    display: flex; gap: 6px; align-items: center; flex-shrink: 0;
  }
  .period-step, .period-pill {
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: inherit; font-size: 12px; font-weight: 600;
    outline: none; cursor: pointer;
    transition: all .18s ease;
  }
  .period-step {
    width: 32px; height: 32px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--purple);
    background: rgba(255,255,255,0.64);
  }
  .period-pill {
    min-width: 148px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 7px 13px;
    color: var(--text);
    background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(225, 215, 245, 0.34), rgba(249, 215, 228, 0.26));
  }
  .period-step:hover, .period-pill:hover, .period-step:focus, .period-pill:focus {
    background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(249, 215, 228, 0.45), rgba(210, 225, 245, 0.35));
    border-color: rgba(165, 149, 196, 0.35);
    box-shadow: var(--shadow-sm);
  }
  .period-step:disabled {
    opacity: .35;
    cursor: default;
    box-shadow: none;
  }
  .period-year { color: var(--text-soft); font-weight: 500; }
  .month-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-top: 14px;
  }
  .month-chip {
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.62);
    border-radius: 14px;
    padding: 9px 6px;
    font-family: inherit; font-size: 12px; font-weight: 600;
    color: var(--text-soft); cursor: pointer;
    transition: all .18s ease;
  }
  .month-chip:hover, .month-chip:focus {
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(225, 215, 245, 0.38), rgba(249, 215, 228, 0.32));
    color: var(--text); border-color: rgba(165, 149, 196, 0.36);
  }
  .month-chip.active {
    color: #fff;
    border-color: transparent;
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
    box-shadow: var(--shadow-sm);
  }
  .year-stepper {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-top: 10px;
  }
  .year-value {
    min-width: 92px; text-align: center;
    font-size: 18px; font-weight: 700; color: var(--text);
    border: 1px solid var(--border);
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(225, 215, 245, 0.34), rgba(249, 215, 228, 0.25));
    padding: 7px 13px;
    font-family: inherit;
    cursor: pointer;
  }
  .year-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-top: 14px;
  }

  /* ───── SUMMARY CARDS ───── */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .summary-card {
    background: rgba(255,255,255,0.55);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 9px 11px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .summary-label {
    font-size: 10px; color: var(--text-soft); font-weight: 500;
    display: flex; align-items: center; gap: 4px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .summary-value {
    font-size: 18px; font-weight: 700;
    margin-top: 3px; letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .summary-sub { font-size: 10px; color: var(--text-faint); margin-top: 2px; font-weight: 300; }
  .v-sage { color: var(--sage); }
  .v-yellow { color: var(--yellow); }
  .v-coral { color: var(--coral); }
  .v-pink { color: var(--pink); }
  .v-purple { color: var(--purple); }
  .v-blue { color: var(--blue); }

  /* ───── CARDS ───── */
  .card {
    background: linear-gradient(135deg, rgba(255,255,255,0.72), rgba(252,250,255,0.50));
    backdrop-filter: blur(22px) saturate(1.3);
    -webkit-backdrop-filter: blur(22px) saturate(1.3);
    border: 1px solid rgba(255,255,255,0.58);
    margin: 14px 12px; border-radius: 24px;
    box-shadow: 0 14px 42px rgba(112,118,178,0.10), inset 0 1px 0 rgba(255,255,255,.72);
    overflow: hidden;
  }
  .card-pad { padding: 18px; }
  .section-title {
    font-size: 16px; font-weight: 600;
    letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; color: var(--text);
  }

  /* ───── SALARY BOX ───── */
  .salary-box {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    background: linear-gradient(135deg, var(--yellow-surface), rgba(252, 240, 205, 0.3));
    border: 1px solid rgba(208, 176, 112, 0.22);
    border-radius: 14px; margin-bottom: 14px;
  }
  .salary-icon-box {
    width: 38px; height: 38px; border-radius: 12px;
    background: rgba(255,255,255,0.55); color: var(--yellow);
    display: flex; align-items: center; justify-content: center;
  }
  .salary-label {
    font-size: 10px; color: var(--text-soft); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .salary-main { flex: 1; min-width: 0; }
  .salary-value { font-size: 21px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; }
  .salary-input {
    width: 100%; border: none; background: transparent;
    font-family: inherit; font-size: 21px; font-weight: 700;
    color: var(--text); letter-spacing: -0.02em;
    padding: 0; outline: none;
  }
  .salary-edit-btn {
    background: rgba(255,255,255,0.7); border: 1px solid var(--border);
    color: var(--text-soft); border-radius: 999px;
    padding: 6px 11px; font-size: 11px; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 4px; font-weight: 500;
  }
  .salary-actions {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .privacy-toggle {
    background: rgba(255,255,255,0.72); border: 1px solid var(--border);
    color: var(--purple); border-radius: 999px;
    padding: 6px 10px; font-size: 11px; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 4px; font-weight: 600;
    white-space: nowrap;
  }
  .privacy-toggle.on {
    color: var(--text-soft);
    background: rgba(255,255,255,0.5);
  }
  .masked-text { letter-spacing: 0.06em; }
  .income-source-strip {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin: -2px 0 12px;
  }
  .income-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.62);
    background:
      linear-gradient(135deg, rgba(255,255,255,.76), rgba(246,240,255,.44), rgba(255,247,225,.42));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.82);
    font-size: 11px; font-weight: 600; color: var(--text-soft);
  }
  .income-pill .num { color: var(--text); }
  .income-pill-icon {
    width: 22px; height: 22px; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.72);
    color: var(--purple);
  }
  .income-inline-editor {
    display: grid; gap: 10px;
    margin: 0 0 14px;
    padding: 12px 12px 10px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.58);
    background:
      linear-gradient(135deg, rgba(255,255,255,.66), rgba(241,236,255,.40), rgba(255,247,228,.34));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.76);
  }
  .income-inline-top {
    display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
  }
  .income-inline-hint {
    font-size: 11px; color: var(--text-soft); font-weight: 500;
  }
  .income-inline-list { display: grid; gap: 8px; }
  .income-row {
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr) 112px auto;
    gap: 8px;
    align-items: center;
  }
  .income-row.base .income-row-remove { opacity: .46; pointer-events: none; }
  .income-row-icon {
    width: 34px; height: 34px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--purple);
    background: rgba(255,255,255,.74);
    border: 1px solid rgba(255,255,255,.62);
  }
  .income-row-input,
  .income-row-amount {
    width: 100%;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.82);
    border-radius: 12px;
    padding: 10px 12px;
    font: inherit;
    font-size: 13px;
    color: var(--text);
    outline: none;
  }
  .income-row-amount {
    text-align: right;
    font-weight: 700;
  }
  .income-row-input:focus,
  .income-row-amount:focus {
    border-color: rgba(165,149,196,.56);
    background: rgba(255,255,255,.96);
  }
  .income-row-remove {
    width: 34px; height: 34px; border-radius: 12px;
    border: 1px solid rgba(214,156,178,.24);
    background: rgba(255,255,255,.72);
    color: var(--text-soft);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .income-add-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 12px; border-radius: 999px;
    border: 1px dashed rgba(165,149,196,.52);
    background: rgba(255,255,255,.68);
    color: var(--purple); font: inherit; font-size: 12px; font-weight: 700;
    cursor: pointer;
  }

  .budget-info {
    font-size: 12px; color: var(--text-soft); margin-bottom: 12px;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .budget-info .v { font-weight: 600; }
  .bar {
    height: 6px; border-radius: 999px;
    background: rgba(170, 160, 180, 0.15);
    display: flex; overflow: hidden; margin-bottom: 16px;
  }
  .bar-seg { transition: width .4s ease; }

  /* ───── BREAKDOWN BARS ───── */
  .breakdown { margin-top: 8px; }
  .breakdown-item {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .breakdown-bar-wrap {
    flex: 1;
  }
  .breakdown-top {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;
  }
  .breakdown-label {
    font-size: 12px; font-weight: 500; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .breakdown-percent {
    font-size: 11px; color: var(--text-soft); font-weight: 500;
  }
  .breakdown-amount {
    font-size: 13px; font-weight: 700; color: var(--text);
  }
  .breakdown-bar {
    height: 8px; border-radius: 999px;
    background: rgba(170, 160, 180, 0.12);
    overflow: hidden;
  }
  .breakdown-fill {
    height: 100%; border-radius: 999px;
    transition: width .5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .breakdown-icon {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ───── FIXED EXPENSES ───── */
  .section-sub {
    font-size: 10px; color: var(--text-soft); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .fixed-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .fixed-row.selected { background: var(--purple-soft); border-radius: 8px; padding-left: 4px; padding-right: 4px; }
  .fixed-row.select-mode { cursor: pointer; }
  .fixed-row:last-of-type { border-bottom: none; }

  .select-mode-toggle {
    background: rgba(255,255,255,0.6); border: 1px solid var(--border);
    color: var(--text-soft); border-radius: 999px;
    padding: 4px 10px; font-size: 10px; cursor: pointer;
    font-family: inherit; font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
    text-transform: none; letter-spacing: normal;
  }
  .select-mode-toggle.on { background: var(--purple); color: #fff; border-color: var(--purple); }

  .select-actions {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 0; margin-bottom: 4px;
    background: var(--purple-soft); border-radius: 10px; padding: 8px 12px;
  }
  .select-count {
    font-size: 12px; color: var(--purple); font-weight: 600;
    margin-right: auto;
  }
  .select-action-btn {
    background: rgba(255,255,255,0.85); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px;
    padding: 5px 10px; font-size: 11px; cursor: pointer;
    font-family: inherit; font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .select-action-btn.coral { background: var(--coral); color: #fff; border-color: var(--coral); }

  .select-checkbox {
    width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
    border: 1.5px solid var(--border-strong);
    background: rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s;
    color: transparent; padding: 0;
  }
  .select-checkbox.on { background: var(--purple); border-color: var(--purple); color: #fff; }

  /* Fixed expense carousel */
  .fixed-carousel {
    overflow-x: auto; overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    margin: 4px 0;
  }
  .fixed-carousel::-webkit-scrollbar { display: none; }
  .fixed-carousel-track { display: flex; gap: 0; }
  .fixed-page {
    flex: 0 0 100%;
    scroll-snap-align: start;
    min-width: 100%;
  }
  .fixed-swipe-bar {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fixed-swipe-step {
    width: 38px;
    height: 38px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.82);
    background: linear-gradient(135deg, rgba(255,244,249,0.92), rgba(255,235,205,0.88));
    color: #b27a93;
    box-shadow: 0 12px 30px rgba(233, 182, 146, 0.18), inset 0 1px 0 rgba(255,255,255,0.95);
    backdrop-filter: blur(16px) saturate(1.18);
    -webkit-backdrop-filter: blur(16px) saturate(1.18);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .fixed-swipe-step:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
  }
  .fixed-swipe-pill {
    flex: 1;
    min-width: 0;
    border: 1px solid rgba(255,255,255,0.82);
    border-radius: 999px;
    padding: 10px 14px;
    background:
      linear-gradient(135deg, rgba(255,250,252,0.94), rgba(255,240,214,0.9)),
      linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.08));
    color: var(--text);
    box-shadow: 0 18px 40px rgba(233, 182, 146, 0.16), inset 0 1px 0 rgba(255,255,255,0.95);
    backdrop-filter: blur(18px) saturate(1.2);
    -webkit-backdrop-filter: blur(18px) saturate(1.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    cursor: pointer;
  }
  .fixed-swipe-copy {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    color: #a4688b;
  }
  .fixed-swipe-copy span {
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .fixed-swipe-page {
    flex-shrink: 0;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(255,255,255,0.8);
    font-size: 11px;
    font-weight: 700;
    color: #bf8e63;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .fixed-name { flex: 1; font-size: 13px; color: var(--text); font-weight: 400; }
  .fixed-name-input {
    flex: 1; font-size: 13px; color: var(--text); font-weight: 400;
    border: 1px solid transparent; background: transparent;
    border-radius: 6px; padding: 5px 8px; font-family: inherit;
    min-width: 0; outline: none; transition: all .15s;
  }
  .fixed-name-input:focus { background: rgba(255,255,255,0.9); border-color: var(--border-strong); }
  .fixed-input {
    width: 80px; text-align: right; border: 1px solid transparent;
    background: rgba(255,255,255,0.5);
    border-radius: 8px; padding: 6px 10px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    transition: all .15s; outline: none;
  }
  .fixed-input:focus { background: rgba(255,255,255,0.95); border-color: var(--border-strong); }
  .currency { font-size: 11px; color: var(--text-faint); font-weight: 300; }
  .fixed-icon-box {
    width: 30px; height: 30px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.62);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .fixed-main { flex: 1; min-width: 0; }
  .fixed-main .fixed-name-input { width: 100%; }
  .fixed-meta {
    font-size: 10px; color: var(--text-faint); margin-top: 1px; font-weight: 300;
  }
  .x-btn {
    background: none; border: none; cursor: pointer; color: var(--text-faint);
    padding: 4px; display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
  }
  .x-btn:active { background: rgba(170, 160, 180, 0.15); color: var(--coral); }

  .add-fixed-btn, .add-item-btn {
    margin-top: 10px; background: none;
    border: 1px dashed var(--border-strong); border-radius: 10px;
    padding: 10px; cursor: pointer; font-size: 12px; color: var(--text-soft);
    font-family: inherit; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-weight: 500;
  }
  .add-item-btn {
    margin: 10px 14px;
    background: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(255,255,255,0.25));
    border: 1px dashed var(--purple);
    color: var(--purple);
  }
  .add-form { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
  .text-input {
    border: 1px solid var(--border-strong); border-radius: 8px;
    padding: 7px 10px; font-size: 13px; font-family: inherit;
    background: rgba(255,255,255,0.75); outline: none;
  }
  .text-input:focus { background: #fff; border-color: var(--yellow); }
  .btn-confirm {
    background: var(--sage); color: #fff; border: none; border-radius: 8px;
    padding: 7px 12px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-dismiss {
    background: rgba(170, 160, 180, 0.15); color: var(--text-soft);
    border: none; border-radius: 8px;
    padding: 7px 10px; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
  }

  .two-col { margin-top: 16px; display: flex; gap: 10px; }
  .two-col > div { flex: 1; }
  .field-label {
    font-size: 10px; color: var(--text-soft); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; align-items: center; gap: 5px; margin-bottom: 5px;
  }
  .field-input {
    width: 100%; border: 1px solid var(--border);
    background: rgba(255,255,255,0.55);
    border-radius: 10px; padding: 8px 12px;
    font-family: inherit; font-size: 15px; font-weight: 600;
    text-align: right; outline: none;
  }
  .field-input:focus { background: #fff; border-color: var(--border-strong); }

  .net-box {
    margin-top: 16px; padding: 14px 16px; border-radius: 14px;
    display: flex; justify-content: space-between; align-items: center;
    border: 1px solid;
  }
  .net-box.pos { background: var(--sage-surface); border-color: rgba(143, 168, 134, 0.3); }
  .net-box.neg { background: var(--coral-surface); border-color: rgba(210, 136, 122, 0.3); }
  .net-label {
    font-size: 11px; font-weight: 500; color: var(--text-soft);
    text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; align-items: center; gap: 6px;
  }
  .net-value { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .net-value.pos { color: var(--sage); }
  .net-value.neg { color: var(--coral); }

  /* ───── CATEGORY ───── */
  .cat-header { padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .cat-header.should { background: linear-gradient(135deg, rgba(225, 240, 215, 0.5), rgba(225, 240, 215, 0.15)); }
  .cat-header.nice { background: linear-gradient(135deg, var(--yellow-surface), rgba(252, 240, 205, 0.2)); }
  .cat-header.big { background: linear-gradient(135deg, var(--pink-surface), rgba(249, 215, 228, 0.2)); }
  .cat-title-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .cat-title-wrap { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .cat-icon-box {
    width: 36px; height: 36px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.65); flex-shrink: 0;
  }
  .cat-icon-box.should { color: var(--sage); }
  .cat-icon-box.nice { color: var(--yellow); }
  .cat-icon-box.big { color: var(--pink); }
  .cat-title {
    font-size: 15px; font-weight: 600;
    letter-spacing: -0.01em; color: var(--text);
  }
  .cat-desc { font-size: 11px; color: var(--text-soft); margin-top: 1px; font-weight: 300; }
  .cat-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .cat-btn {
    background: rgba(255,255,255,0.6); border: 1px solid var(--border-strong);
    border-radius: 999px; padding: 5px 10px;
    font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 4px;
    color: var(--text-soft);
  }
  .cat-btn:active { background: rgba(255,255,255,0.9); }
  .cat-btn.edit-on { background: var(--purple); color: #fff; border-color: var(--purple); }
  .cat-btn.all-checked { background: var(--sage); color: #fff; border-color: var(--sage); }

  .cat-totals {
    display: flex; gap: 14px; margin-top: 12px; font-size: 11px; color: var(--text-soft);
    flex-wrap: wrap;
  }
  .cat-totals .v { font-weight: 600; font-size: 12px; }
  .cat-totals .v.deep { color: var(--coral); }
  .cat-totals .v.avg { color: var(--blue); }
  .cat-totals-sel {
    display: flex; gap: 14px; margin-top: 4px; font-size: 11px;
    color: var(--sage); font-weight: 500;
    flex-wrap: wrap;
  }

  .edit-banner {
    margin: 0 14px 8px; padding: 8px 12px;
    background: var(--purple-soft);
    border: 1px solid rgba(165, 149, 196, 0.3);
    border-radius: 10px;
    font-size: 11px; color: var(--purple); font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }

  /* ───── SEARCH + PAGINATION ───── */
  .search-bar {
    margin: 10px 14px 4px; position: relative;
  }
  .search-input {
    width: 100%; padding: 9px 12px 9px 34px; border: 1px solid var(--border);
    border-radius: 10px; font-family: inherit; font-size: 13px;
    background: rgba(255,255,255,0.6); outline: none; transition: all .15s;
  }
  .search-input:focus { background: #fff; border-color: var(--purple); }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--text-faint); pointer-events: none;
  }
  .search-clear {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: rgba(170, 160, 180, 0.2); border: none; cursor: pointer;
    color: var(--text-soft); border-radius: 50%; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .search-clear:active { background: rgba(170, 160, 180, 0.4); }
  .search-empty {
    padding: 24px 14px; text-align: center;
    color: var(--text-faint); font-size: 13px; font-weight: 300;
  }
  .search-empty b { color: var(--text); font-weight: 500; }

  .page-mode-bar {
    margin: 8px 14px 0; display: flex; gap: 8px; align-items: center;
    font-size: 11px; color: var(--text-soft); flex-wrap: wrap;
  }
  .page-mode-toggle {
    display: flex; gap: 2px; background: rgba(255,255,255,0.4);
    border: 1px solid var(--border); border-radius: 999px; padding: 2px;
  }
  .page-mode-btn {
    padding: 4px 10px; border-radius: 999px; border: none; cursor: pointer;
    font-family: inherit; font-size: 10px; font-weight: 500;
    background: transparent; color: var(--text-faint);
    display: flex; align-items: center; gap: 3px;
  }
  .page-mode-btn.active { background: var(--purple); color: #fff; }

  .pagination {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; justify-content: center;
    font-size: 12px; color: var(--text-soft); flex-wrap: wrap;
  }
  .page-btn {
    background: rgba(255,255,255,0.6); border: 1px solid var(--border);
    color: var(--text-soft); border-radius: 8px;
    padding: 5px 10px; font-family: inherit; font-size: 12px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .page-btn:not(:disabled):active { background: #fff; }
  .page-current {
    background: var(--purple); color: #fff; border: none;
    border-radius: 8px; padding: 5px 12px; font-family: inherit;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }

  /* ───── ITEMS ───── */
  .items { padding: 6px 10px; }
  .items.items-carousel {
    padding: 6px 0 4px;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-x: contain;
    scrollbar-width: none;
  }
  .items.items-carousel::-webkit-scrollbar { display: none; }
  .items-track { display: flex; gap: 0; }
  .items-page {
    flex: 0 0 100%;
    min-width: 100%;
    scroll-snap-align: start;
    padding: 0 10px;
  }
  .items-page-stack { display: block; }
  .category-pagination {
    padding-top: 8px;
    padding-bottom: 6px;
  }
  .item {
    display: flex; align-items: center; gap: 12px; padding: 12px;
    border-radius: 12px; cursor: pointer; transition: all .15s;
    border: 1px solid transparent;
  }
  .item.checked { background: var(--sage-soft); border-color: rgba(143, 168, 134, 0.25); }
  .item:not(.checked):active { background: rgba(170, 160, 180, 0.06); }
  .item.edit-mode { background: rgba(255,255,255,0.35); border-color: var(--border); }
  .item.edit-mode:active { background: rgba(255,255,255,0.7); }
  .checkbox {
    width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
    border: 1.5px solid var(--border-strong);
    background: rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; color: transparent;
  }
  .checkbox.checked { background: var(--sage); border-color: var(--sage); color: #fff; }
  .edit-handle {
    width: 22px; height: 22px; flex-shrink: 0; color: var(--purple);
    display: flex; align-items: center; justify-content: center;
  }
  .item-main { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 400; color: var(--text); word-break: break-word; }
  .item-note { font-size: 11px; color: var(--text-faint); margin-top: 2px; font-weight: 300; }
  .item-right { text-align: right; flex-shrink: 0; }
  .item-price {
    font-size: 15px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 8px;
    color: var(--text); transition: all .15s;
  }
  .item.checked .item-price { color: var(--sage); }
  .item-price:active { background: rgba(170, 160, 180, 0.15); }
  .item-price .edit-icon { opacity: 0.35; color: var(--text-soft); }
  .item-price.edited::before {
    content: ""; display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--yellow); margin-right: 3px;
  }
  .item-alt-price { font-size: 10px; color: var(--text-faint); margin-top: 1px; font-weight: 400; }

  /* ───── BUY BUTTON ───── */
  .buy-btn-wrap {
    padding: 8px 14px 14px;
  }
  .buy-btn {
    width: 100%; padding: 12px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--sage), #7d9674);
    color: #fff; font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 2px 8px rgba(143, 168, 134, 0.3);
    transition: all .15s;
  }
  .buy-btn:active { transform: translateY(1px); }
  .buy-btn:disabled {
    background: rgba(170, 160, 180, 0.2); color: var(--text-faint);
    box-shadow: none; cursor: not-allowed;
  }

  /* ───── HISTORY ───── */
  .history-empty {
    text-align: center; padding: 48px 24px;
    color: var(--text-faint); font-weight: 300;
  }
  .history-empty-icon {
    width: 60px; height: 60px; margin: 0 auto 16px;
    border-radius: 50%; background: var(--purple-soft);
    display: flex; align-items: center; justify-content: center;
    color: var(--purple);
  }
  .history-empty-title {
    font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px;
  }

  /* ───── MODAL ───── */
  #modal-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; pointer-events: none; }
  #modal-container.open { pointer-events: auto; }
  .modal-bg {
    position: absolute; inset: 0;
    background: rgba(46, 42, 51, 0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;

    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid var(--border);
    border-radius: 22px; padding: 24px;
    width: 100%; max-width: 380px;
    box-shadow: var(--shadow-lg);
    animation: slideUp .25s ease;
    max-height: 90vh; overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-bg.no-anim, .modal.no-anim { animation: none; }
  .modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }

body {
  --app-theme-mesh: linear-gradient(135deg, #dff3ff 0%, #f7faff 42%, #ffe2f0 68%, #fff4de 100%);
  --app-theme-glow: #8cc9f4;
  background:
    linear-gradient(135deg, rgba(255,255,255,.34), rgba(255,255,255,.58)),
    var(--app-theme-mesh) !important;
  background-size: auto, 220% 220% !important;
  background-attachment: fixed !important;
  animation: appMeshBreath 32s ease-in-out infinite alternate;
}
body::before {
  content:"";
  position:fixed;
  inset:-12%;
  z-index:-2;
  pointer-events:none;
  opacity:.86;
  background:
    radial-gradient(circle at 14% 18%, rgba(255,255,255,.78) 0 1px, rgba(255,255,255,.14) 2px 34px, rgba(255,255,255,.62) 35px 37px, transparent 38px),
    radial-gradient(circle at 82% 16%, rgba(255,255,255,.66) 0 1px, rgba(255,255,255,.12) 2px 46px, rgba(255,255,255,.48) 47px 49px, transparent 50px),
    radial-gradient(circle at 72% 78%, rgba(255,255,255,.72) 0 1px, rgba(255,255,255,.13) 2px 42px, rgba(255,255,255,.52) 43px 45px, transparent 46px),
    radial-gradient(circle at 22% 84%, rgba(255,255,255,.62) 0 1px, rgba(255,255,255,.10) 2px 28px, rgba(255,255,255,.48) 29px 31px, transparent 32px),
    var(--app-theme-mesh);
  background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 180% 180%;
  filter: saturate(1.04);
  animation: bubbleDrift 36s ease-in-out infinite alternate;
}
body::after {
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  opacity:.42;
  background:
    radial-gradient(circle at 50% 8%, rgba(255,255,255,.72), transparent 18%),
    radial-gradient(circle at 8% 52%, color-mix(in srgb, var(--app-theme-glow) 28%, transparent), transparent 24%),
    radial-gradient(circle at 92% 64%, color-mix(in srgb, var(--app-theme-glow) 22%, transparent), transparent 26%);
  animation: bubbleDriftSoft 42s ease-in-out infinite alternate;
}
@keyframes appMeshBreath {
  from { background-position: center, 0% 0%; }
  to { background-position: center, 100% 100%; }
}
@keyframes bubbleDrift {
  from { transform: translate3d(-1.5%, -1%, 0) scale(1); background-position: center, center, center, center, 0% 50%; }
  to { transform: translate3d(1.8%, 1.2%, 0) scale(1.03); background-position: center, center, center, center, 100% 50%; }
}
@keyframes bubbleDriftSoft {
  from { transform: translate3d(0, 0, 0); }
  to { transform: translate3d(0, -18px, 0); }
}
.theme-choice, .tone-choice, .icon-choice {
  position: relative;
  overflow: hidden;
}
.theme-choice.active, .tone-choice.active, .icon-choice.active {
  border-color: rgba(140,201,244,.58) !important;
  background: linear-gradient(135deg, rgba(255,255,255,.88), rgba(224,243,255,.68), rgba(255,226,240,.58), rgba(255,244,222,.52)) !important;
  color: var(--text) !important;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.72) inset,
    0 0 28px color-mix(in srgb, var(--app-theme-glow) 42%, transparent),
    0 14px 34px rgba(147,126,214,.16) !important;
  animation: selectedMeshGlow 5.5s ease-in-out infinite alternate;
}
.theme-choice.active::after, .tone-choice.active::after, .icon-choice.active::after {
  content:"";
  position:absolute;
  inset:-35%;
  pointer-events:none;
  background: linear-gradient(120deg, transparent 18%, rgba(255,255,255,.58) 42%, transparent 68%);
  transform: translateX(-38%);
  animation: selectedMeshSweep 7s ease-in-out infinite;
}
.icon-choice.active svg, .icon-choice.active * { color: var(--text) !important; }
@keyframes selectedMeshGlow {
  from { filter: saturate(1) brightness(1); }
  to { filter: saturate(1.12) brightness(1.03); }
}
@keyframes selectedMeshSweep {
  0%, 42% { transform: translateX(-48%) rotate(4deg); opacity:.18; }
  74% { transform: translateX(48%) rotate(4deg); opacity:.58; }

function persistLang(lang = state.lang) {
  try {
    localStorage.setItem(LANG_STORAGE_KEY, lang === 'en' ? 'en' : 'th');
  } catch (e) {}
}

function save() {
  try {
    persistLang();
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      lang: state.lang,
      tab: state.tab,
      items: state.items, selected: state.selected, priceMode: state.priceMode,
      fixed: state.fixed, incomeSources: state.incomeSources, savings: state.savings, emergency: state.emergency, salary: state.salary,
      hideIncome: state.hideIncome, incomePin: state.incomePin, resetCode: state.resetCode,
      pinRecoveryCodes: state.pinRecoveryCodes, pinRecoveryHint: state.pinRecoveryHint,
      planMonth: state.planMonth, planYear: state.planYear,
      itemSearch: state.itemSearch, itemSort: state.itemSort, itemPageMode: state.itemPageMode, itemPages: state.itemPages,
      categoryPage: state.categoryPage, bulkCategoryEdit: state.bulkCategoryEdit,
      catLabels: state.catLabels, catCustom: state.catCustom, categoryOrder: state.categoryOrder, collapsedCats: state.collapsedCats,
      historySearch: state.historySearch,
      overviewMode: state.overviewMode, overviewYear: state.overviewYear, overviewMonth: state.overviewMonth,
      overviewPage: state.overviewPage, overviewExpanded: state.overviewExpanded, overviewSearch: state.overviewSearch, profileAge: state.profileAge, profileOccupation: state.profileOccupation,
      bkkOfficialCategory: state.bkkOfficialCategory, bkkOfficialCompareYear: state.bkkOfficialCompareYear,
      appThemeTone: state.appThemeTone,
      tax: state.tax,
      purchases: state.purchases,
    }));
    showSaveStatus();
  } catch (e) {}
}

function load() {
  try {
    const storedLang = localStorage.getItem(LANG_STORAGE_KEY);
    if (storedLang === 'th' || storedLang === 'en') state.lang = storedLang;
    let raw = localStorage.getItem(STORAGE_KEY);

    // ถ้ายังไม่มีข้อมูลใน key ใหม่ ลองหาใน key เก่าแล้วย้ายมา
    if (!raw) {
      for (const oldKey of OLD_KEYS) {
        const oldData = localStorage.getItem(oldKey);
        if (oldData) {
          raw = oldData;
          localStorage.setItem(STORAGE_KEY, oldData);
          console.log(`กู้ข้อมูลจาก ${oldKey} มาสู่ ${STORAGE_KEY} แล้ว`);
          break;
        }
      }
    }

    if (!raw) return;
    const s = JSON.parse(raw);
    if (!storedLang && (s.lang === 'th' || s.lang === 'en')) state.lang = s.lang;
    if (s.tab) state.tab = s.tab;
    if (s.items && Array.isArray(s.items)) state.items = s.items;
    if (s.selected) state.selected = s.selected;
    if (s.priceMode) state.priceMode = s.priceMode;
    if (s.fixed) state.fixed = s.fixed.map(normalizeFixedItem);
    if (Array.isArray(s.incomeSources)) state.incomeSources = s.incomeSources.map(normalizeIncomeSource);
    if (typeof s.savings === "number") state.savings = s.savings;
    if (typeof s.emergency === "number") state.emergency = s.emergency;
    if (typeof s.salary === "number") state.salary = s.salary;
    if (typeof s.hideIncome === "boolean") state.hideIncome = s.hideIncome;
    if (typeof s.incomePin === "string") state.incomePin = s.incomePin;
    if (typeof s.resetCode === "string") state.resetCode = s.resetCode;
    if (typeof s.pinRecoveryCodes === "string") state.pinRecoveryCodes = s.pinRecoveryCodes;
    if (typeof s.pinRecoveryHint === "string") state.pinRecoveryHint = s.pinRecoveryHint;
    if (typeof s.planMonth === "number") state.planMonth = Math.min(12, Math.max(1, s.planMonth));
    if (typeof s.planYear === "number") state.planYear = s.planYear;
    if (typeof s.itemSearch === "string") state.itemSearch = s.itemSearch;
    if (["wishlist", "high", "low"].includes(s.itemSort)) state.itemSort = s.itemSort;
    if (s.itemPageMode === "all" || s.itemPageMode === "paged") state.itemPageMode = s.itemPageMode;
    if (s.itemPages && typeof s.itemPages === "object") state.itemPages = s.itemPages;
    if (typeof s.categoryPage === "number") state.categoryPage = Math.max(0, s.categoryPage);
    if (typeof s.bulkCategoryEdit === "boolean") state.bulkCategoryEdit = s.bulkCategoryEdit;
    if (s.catLabels && typeof s.catLabels === "object") state.catLabels = s.catLabels;
    if (s.catCustom && typeof s.catCustom === "object") state.catCustom = s.catCustom;
    if (Array.isArray(s.categoryOrder)) state.categoryOrder = s.categoryOrder.length ? s.categoryOrder : DEFAULT_CATEGORY_ORDER.slice();
    if (s.collapsedCats && typeof s.collapsedCats === "object") state.collapsedCats = s.collapsedCats;
    getCategoryIds().forEach(id => { if (!state.categoryOrder.includes(id)) state.categoryOrder.push(id); });
    if (typeof s.historySearch === "string") state.historySearch = s.historySearch;
    if (s.overviewMode === "monthly" || s.overviewMode === "yearly") state.overviewMode = s.overviewMode;
    if (s.overviewYear === "all" || typeof s.overviewYear === "number") state.overviewYear = s.overviewYear;
    if (s.overviewMonth === "all" || (typeof s.overviewMonth === "number" && s.overviewMonth >= 1 && s.overviewMonth <= 12)) state.overviewMonth = s.overviewMonth;
    if (typeof s.overviewPage === "number") state.overviewPage = Math.max(0, s.overviewPage);
    if (s.overviewExpanded && typeof s.overviewExpanded === "object") state.overviewExpanded = s.overviewExpanded;
    if (typeof s.overviewSearch === "string") state.overviewSearch = s.overviewSearch;
    if (typeof s.profileAge === "number" || typeof s.profileAge === "string") state.profileAge = s.profileAge;
    if (typeof s.profileOccupation === "string") state.profileOccupation = s.profileOccupation;
    if (typeof s.bkkOfficialCategory === "string" && BKK_OFFICIAL_CATEGORY_META[s.bkkOfficialCategory]) state.bkkOfficialCategory = s.bkkOfficialCategory;
    if (typeof s.bkkOfficialCompareYear === "number") state.bkkOfficialCompareYear = s.bkkOfficialCompareYear;
    if (typeof s.appThemeTone === "string") state.appThemeTone = normalizeCustomCategoryTone(s.appThemeTone);
    if (s.tax && typeof s.tax === "object") state.tax = { ...state.tax, ...s.tax };
    if (s.purchases && Array.isArray(s.purchases)) state.purchases = s.purchases.map(normalizePurchaseBatch);
    if (storedLang === 'th' || storedLang === 'en') state.lang = storedLang;
  } catch (e) { console.warn("Load error:", e); }
}

function exportData() {
  try {
    const data = {
      version: "expense-tracker-everblue-1.1",
      lang: state.lang,
      exportedAt: new Date().toISOString(),
      items: state.items, selected: state.selected, priceMode: state.priceMode,
      fixed: state.fixed, incomeSources: state.incomeSources, savings: state.savings, emergency: state.emergency,
      salary: state.salary, hideIncome: state.hideIncome, incomePin: state.incomePin, resetCode: state.resetCode,
      pinRecoveryCodes: state.pinRecoveryCodes, pinRecoveryHint: state.pinRecoveryHint,
      planMonth: state.planMonth, planYear: state.planYear,
      itemSearch: state.itemSearch, itemSort: state.itemSort, itemPageMode: state.itemPageMode, itemPages: state.itemPages,
      categoryPage: state.categoryPage, bulkCategoryEdit: state.bulkCategoryEdit,
      catLabels: state.catLabels, catCustom: state.catCustom, categoryOrder: state.categoryOrder, collapsedCats: state.collapsedCats,
      historySearch: state.historySearch,
      overviewMode: state.overviewMode, overviewYear: state.overviewYear, overviewMonth: state.overviewMonth,
      overviewPage: state.overviewPage, overviewExpanded: state.overviewExpanded, overviewSearch: state.overviewSearch, profileAge: state.profileAge, profileOccupation: state.profileOccupation,
      bkkOfficialCategory: state.bkkOfficialCategory, bkkOfficialCompareYear: state.bkkOfficialCompareYear,
      appThemeTone: state.appThemeTone,
      tax: state.tax,
      purchases: state.purchases,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const today = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `shopping-tracker-backup-${today}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showSaveStatus();
  } catch (e) {
    alert("สำรองข้อมูลไม่สำเร็จ: " + e.message);
  }
}

function triggerImport() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const s = JSON.parse(ev.target.result);
        if (!Array.isArray(s.items) && !Array.isArray(s.purchases) && !Array.isArray(s.fixed)) throw new Error("ไฟล์ไม่ถูกต้อง");
        if (!Array.isArray(s.items)) s.items = [];
        pendingImport = s;
        state.modal = { type: 'confirmImport' };
        renderModal();
      } catch (err) {
        alert("นำเข้าไฟล์ไม่ได้: " + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

}

function filteredItemsForCategory(cat, query = state.itemSearch) {
  const base = state.items.filter(i => i.cat === cat);
  const q = normalizeSearchText(query);
  const filtered = q ? base.filter(i => matchesAnyLang(i, q)) : base.slice();
  if (state.itemSort === "high") return filtered.sort((a, b) => (state.priceMode === "deep" ? b.deep - a.deep : b.avg - a.avg));
  if (state.itemSort === "low") return filtered.sort((a, b) => (state.priceMode === "deep" ? a.deep - b.deep : a.avg - b.avg));
  return filtered;
}
function purchasedFrozenItemsForCategory(cat, query = state.itemSearch) {
  const q = normalizeSearchText(query);
  const activeIds = new Set((state.items || []).map(i => i.id));
  return (state.purchases || [])
    .filter(batch => (batch.periodMonth || new Date(batch.date).getMonth() + 1) === state.planMonth && (batch.periodYear || new Date(batch.date).getFullYear()) === state.planYear)
    .flatMap(batch => (batch.items || []).map(item => ({ ...item, batchDate: batch.date, batchId: batch.id })))
    .filter(item => item.cat === cat && !activeIds.has(item.originalId))
    .filter(item => !q || itemMatchesSearch(item, q) || matchesText(item.price, q));
}
function totalCategoryPages(cat) {
  return Math.max(1, Math.ceil(filteredItemsForCategory(cat).length / ITEM_PAGE_SIZE));
}
function categoryCarouselId(cat) {
  return `cat-carousel-${cat}`;
}
function categoryCurrentPage(cat) {
  const totalPages = totalCategoryPages(cat);
  return Math.max(0, Math.min(totalPages - 1, state.itemPages?.[cat] || 0));
}
function updateCategoryPager(cat, pageIdx = categoryCurrentPage(cat)) {
  const totalPages = totalCategoryPages(cat);
  const current = Math.max(0, Math.min(totalPages - 1, pageIdx));
  const label = document.getElementById(`cat-page-label-${cat}`);
  const prev = document.getElementById(`cat-page-prev-${cat}`);
  const next = document.getElementById(`cat-page-next-${cat}`);
  if (label) label.textContent = `${t('page')} ${current + 1} / ${totalPages}`;
  if (prev) prev.disabled = current <= 0;
  if (next) next.disabled = current >= totalPages - 1;
}
function scrollCategoryPage(cat, pageIdx, behavior = 'smooth') {
  const el = document.getElementById(categoryCarouselId(cat));
  if (!el) return false;
  const next = Math.max(0, Math.min(totalCategoryPages(cat) - 1, pageIdx));
  state.itemPages = state.itemPages || {};
  state.itemPages[cat] = next;
  el.scrollTo({ left: next * el.clientWidth, behavior });
  updateCategoryPager(cat, next);
  return true;
}
function syncCategoryPage(cat) {
  const el = document.getElementById(categoryCarouselId(cat));
  if (!el) return;
  const pageWidth = el.clientWidth || 1;
  const next = Math.max(0, Math.min(totalCategoryPages(cat) - 1, Math.round(el.scrollLeft / pageWidth)));
  state.itemPages = state.itemPages || {};
  const prev = state.itemPages[cat];
  state.itemPages[cat] = next;
  updateCategoryPager(cat, next);
  if (prev !== next) saveDebounced();
}
function syncAllCategoryCarousels() {
  document.querySelectorAll('.items.items-carousel[data-swipe-cat]').forEach(el => {
    const cat = el.getAttribute('data-swipe-cat');
    if (!cat) return;
    const next = categoryCurrentPage(cat);
    el.scrollLeft = next * el.clientWidth;
    updateCategoryPager(cat, next);
  });
}
function shiftItemPage(cat, delta) {
  state.itemPages = state.itemPages || {};
  const maxPage = Math.max(0, totalCategoryPages(cat) - 1);
  const next = Math.min(maxPage, Math.max(0, (state.itemPages[cat] || 0) + delta));
  if (scrollCategoryPage(cat, next)) {
    saveDebounced();
    return;
  }
  state.itemPages[cat] = next;
  renderApp(); saveDebounced();
}
const CATEGORY_PAGE_SIZE = 5;

}
function categoryListCurrentPage() {

}
function shiftCategoryListPage(delta) {

}

let categorySwipe = null;
function startCategorySwipe(event, cat) {
  if (!event || !event.currentTarget) return;
  if (event.target.closest('button,input,textarea,select,.items,.cat-edit-panel')) return;
  categorySwipe = { cat, el: event.currentTarget, x: event.clientX, y: event.clientY, active: false };
}
function moveCategorySwipe(event) {
  if (!categorySwipe) return;
  const dx = event.clientX - categorySwipe.x;
  const dy = event.clientY - categorySwipe.y;
  categorySwipe.active = dx > 18 && Math.abs(dx) > Math.abs(dy) * 1.25;
  categorySwipe.el.classList.toggle('swiping-delete', categorySwipe.active);
}
function endCategorySwipe(event) {
  if (!categorySwipe) return;
  const swipe = categorySwipe;
  categorySwipe = null;
  swipe.el.classList.remove('swiping-delete');
  const dx = event.clientX - swipe.x;
  const dy = event.clientY - swipe.y;
  if (dx > 86 && Math.abs(dx) > Math.abs(dy) * 1.35) {
    event.preventDefault();
    requestDeleteCategory(swipe.cat);
  }
}
function cancelCategorySwipe() {
  if (categorySwipe && categorySwipe.el) categorySwipe.el.classList.remove('swiping-delete');
  categorySwipe = null;
}
let touchStartX = 0;
let touchStartY = 0;
const catWheelBuffer = {};
function handleCatTouchStart(e, cat) {
  const t = e.changedTouches && e.changedTouches[0];
  if (!t) return;
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}
function handleCatTouchEnd(e, cat) {
  const t = e.changedTouches && e.changedTouches[0];
  if (!t) return;
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if (Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
  const totalPages = totalCategoryPages(cat);
  if (totalPages <= 1) return;
  const current = state.itemPages[cat] || 0;
  if (dx < 0 && current < totalPages - 1) shiftItemPage(cat, 1);
  if (dx > 0 && current > 0) shiftItemPage(cat, -1);
}
function handleCatWheel(event, cat) {
  const el = document.getElementById(categoryCarouselId(cat));
  if (!el || el.scrollWidth <= el.clientWidth + 4) return;
  const primaryDelta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY;
  if (!primaryDelta) return;
  event.preventDefault();
  el.scrollLeft += primaryDelta;
  syncCategoryPage(cat);
}

function pickPage(page) {

    state.itemPages = state.itemPages || {};

  state.modal = null;
  renderModal();
  if (scope === 'fixed') {

function saveOverviewProfile() {
  if (!state.modal || state.modal.type !== 'overviewProfile') return;
  const ageEl = document.getElementById('overview-age');
  const occupationEl = document.getElementById('overview-occupation');
  const raw = ageEl ? String(ageEl.value || '').trim() : '';
  const occupation = occupationEl ? String(occupationEl.value || '').trim().slice(0, 80) : '';
  if (!raw) {
    state.profileAge = "";

    renderModal(); renderApp(); saveDebounced();

  }
  const age = Math.floor(+raw || 0);
  if (age < 13 || age > 90) {
    state.modal.error = state.lang === 'en' ? 'Enter an age between 13 and 90.' : 'ใส่อายุระหว่าง 13 ถึง 90 ปี';

function toggle(id) {
  const i = state.selected.indexOf(id);
  if (i >= 0) state.selected.splice(i, 1); else state.selected.push(id);
  renderApp(); saveDebounced();
}
function selectAllInCat(cat) {
  const ids = state.items.filter(i => i.cat === cat).map(i => i.id);
  const allChecked = ids.every(id => state.selected.includes(id));
  if (allChecked) state.selected = state.selected.filter(id => !ids.includes(id));
  else ids.forEach(id => { if (!state.selected.includes(id)) state.selected.push(id); });
  renderApp(); saveDebounced();
}

function saveIncomePin() {
  if (!state.modal || state.modal.type !== 'setIncomePin') return;
  const currentEl = document.getElementById('pin-current');
  const pinEl = document.getElementById('pin-new');
  const confirmEl = document.getElementById('pin-confirm');
  const current = pinOnly(currentEl ? currentEl.value : "");
  const pin = pinOnly(pinEl ? pinEl.value : "");
  const confirm = pinOnly(confirmEl ? confirmEl.value : "");
  if (state.incomePin && !state.modal.skipCurrent && current !== state.incomePin) {
    state.modal.error = "PIN เดิมไม่ถูกต้อง";
    renderModal(); return;
  }
  if (pin.length !== 4 || confirm.length !== 4) {
    state.modal.error = "ใส่ PIN เป็นตัวเลข 4 หลัก";
    renderModal(); return;
  }
  if (pin !== confirm) {
    state.modal.error = "PIN สองช่องไม่ตรงกัน";
    renderModal(); return;
  }
  const recoveryEl = document.getElementById('pin-recovery-codes');
  const hintEl = document.getElementById('pin-recovery-hint');
  const hint = String(hintEl ? hintEl.value : '').trim();
  if (!hint) {
    state.modal.error = state.lang === 'en' ? 'Please add a PIN hint.' : 'กรุณาใส่คำใบ้ PIN';
    renderModal(); return;
  }
  state.incomePin = pin;
  if (recoveryEl) state.pinRecoveryCodes = String(recoveryEl.value || '').trim();
  state.pinRecoveryHint = hint;
  if (state.modal.unlockAfterSet) state.hideIncome = false;
  state.modal = null;
  renderModal(); renderApp(); saveDebounced();
}

  const el = document.getElementById('pin-recovery-entry');

function saveResetCode() {

  const currentEl = document.getElementById('reset-code-current');
  const codeEl = document.getElementById('reset-code-new');
  const confirmEl = document.getElementById('reset-code-confirm');

  if (code !== confirm) {

  if (!el) return;
  const totalPages = document.querySelectorAll('#fixed-dots .icon-picker-dot').length || 1;
  const next = Math.max(0, Math.min(totalPages - 1, pageIdx));
  state.fixedPage = next;
  el.scrollTo({ left: next * el.clientWidth, behavior: 'smooth' });
}
function updateFixedPagerUi(activePage, totalPages) {
  const pageEl = document.getElementById('fixed-swipe-page');
  const prevEl = document.getElementById('fixed-swipe-prev');
  const nextEl = document.getElementById('fixed-swipe-next');
  if (pageEl) pageEl.textContent = `${state.lang === 'en' ? 'Page' : 'หน้า'} ${activePage + 1}/${totalPages}`;
  if (prevEl) prevEl.disabled = activePage <= 0;
  if (nextEl) nextEl.disabled = activePage >= totalPages - 1;
}
function syncFixedCarousel() {
  const el = document.getElementById('fixed-carousel');
  if (!el) return;
  const totalPages = document.querySelectorAll('#fixed-dots .icon-picker-dot').length || 1;
  const next = Math.max(0, Math.min(totalPages - 1, state.fixedPage || 0));
  el.scrollLeft = next * el.clientWidth;
  updateFixedPagerUi(next, totalPages);
  updateFixedDots();
}
function updateFixedDots() {
  const el = document.getElementById('fixed-carousel');
  const dotsEl = document.getElementById('fixed-dots');
  if (!el || !dotsEl) return;
  const pageWidth = el.clientWidth || 1;
  const activePage = Math.round(el.scrollLeft / pageWidth);
  const prev = state.fixedPage || 0;
  state.fixedPage = activePage;
  const dots = dotsEl.querySelectorAll('.icon-picker-dot');
  dots.forEach((d, i) => d.classList.toggle('active', i === activePage));
  updateFixedPagerUi(activePage, dots.length || 1);
  if (prev !== activePage) saveDebounced();
}

// ── Restore ──
function restoreBatch(batchId) {
  const batch = state.purchases.find(p => p.id === batchId);
  if (!batch) return;
  state.modal = {
    type: 'confirmRestoreBatch',
    batchId,
    itemCount: batch.items.length,
    date: batch.date,
  };
  renderModal();
}

function doRestoreBatch(batchId) {
  const batch = state.purchases.find(p => p.id === batchId);
  if (!batch) { state.modal = null; renderModal(); return; }

  // restore each item back to main list
  batch.items.forEach(it => {
    const def = DEFAULT_ITEMS.find(d => d.id === it.originalId);
    const existing = state.items.find(i => i.id === it.originalId);
    if (existing) return; // already there
    const id = def ? it.originalId : nextId();
    const priceField = batch.priceMode === 'deep' ? 'deep' : 'avg';
    const other = def ? (batch.priceMode === 'deep' ? def.avg : def.deep) : it.price;
    state.items.push({
      id, name: it.name, cat: it.cat, note: it.note || '',
      [priceField]: it.price,
      [priceField === 'deep' ? 'avg' : 'deep']: other,
    });
  });
  state.purchases = state.purchases.filter(p => p.id !== batchId);
  state.modal = null;
  renderModal(); renderApp(); saveDebounced();
}

function restoreOneItem(batchId, originalId) {
  const batch = state.purchases.find(p => p.id === batchId);
  if (!batch) return;
  const it = batch.items.find(i => i.originalId === originalId);
  if (!it) return;

  const def = DEFAULT_ITEMS.find(d => d.id === it.originalId);
  const existing = state.items.find(i => i.id === it.originalId);
  if (!existing) {
    const id = def ? it.originalId : nextId();
    const priceField = batch.priceMode === 'deep' ? 'deep' : 'avg';
    const other = def ? (batch.priceMode === 'deep' ? def.avg : def.deep) : it.price;
    state.items.push({
      id, name: it.name, cat: it.cat, note: it.note || '',
      [priceField]: it.price,
      [priceField === 'deep' ? 'avg' : 'deep']: other,
    });
  }

  batch.items = batch.items.filter(i => i.originalId !== originalId);
  if (batch.items.length === 0) {
    state.purchases = state.purchases.filter(p => p.id !== batchId);
  }
  renderApp(); saveDebounced();
}

function saveModal() {
  if (!state.modal) return;
  const m = state.modal;

  if (m.type === 'price') {
    const deepEl = document.getElementById('edit-deep');
    const avgEl = document.getElementById('edit-avg');
    const item = state.items.find(i => i.id === m.itemId);
    if (item && deepEl && avgEl) {
      item.deep = Math.max(0, +deepEl.value || 0);
      item.avg = Math.max(0, +avgEl.value || 0);
    }
  } else if (m.type === 'full') {
    const nameEl = document.getElementById('edit-name');
    const deepEl = document.getElementById('edit-deep');
    const avgEl = document.getElementById('edit-avg');
    const noteEl = document.getElementById('edit-note');
    if (!nameEl || !nameEl.value.trim()) { alert('กรุณาใส่ชื่อรายการ'); return; }
    const data = {
      name: nameEl.value.trim(),
      deep: Math.max(0, +deepEl.value || 0),
      avg: Math.max(0, +avgEl.value || 0),
      note: noteEl.value.trim(),
    };
    if (m.itemId == null) {
      state.items.push({ id: nextId(), ...data, cat: m.cat });
    } else {
      const item = state.items.find(i => i.id === m.itemId);
      if (item) Object.assign(item, data);
    }
  }
  state.modal = null;
  renderModal(); renderApp(); saveDebounced();
}

// ═══════════════════════════════════════════════════════════════════
// COMPUTED
// ═══════════════════════════════════════════════════════════════════
function compute() {
  const shopSpend = state.items.filter(i => state.selected.includes(i.id))
    .reduce((s, i) => s + (state.priceMode === "deep" ? i.deep : i.avg), 0);
  const fixedItems = getFixedForPeriod();
  const fixedTotal = fixedItems.reduce((s, f) => s + f.amount, 0);
  const totalSpend = fixedTotal + state.savings + state.emergency + shopSpend;
  return { shopSpend, fixedTotal, fixedItems, totalSpend, remaining: currentIncomeTotal() - totalSpend };
}
function catTotals() {
  const out = {};
  getCategoryIds().forEach(c => {
    const items = state.items.filter(i => i.cat === c);
    const sel = items.filter(i => state.selected.includes(i.id));
    out[c] = {
      count: items.length, selCount: sel.length,
      deepAll: items.reduce((s, i) => s + i.deep, 0),
      avgAll: items.reduce((s, i) => s + i.avg, 0),
      deepSel: sel.reduce((s, i) => s + i.deep, 0),
      avgSel: sel.reduce((s, i) => s + i.avg, 0),
    };
  });
  return out;
}

  applyAppTheme();

    renderHistoryTab();

    renderOverviewTab();
  } else if (state.tab === 'tax') {
    renderTaxTab();

}

function renderBreakdown(fixedTotal, shopSpend, totalSpend) {
  const totalIncome = currentIncomeTotal();
  // breakdown: fixed | savings | emergency | shop items
  const parts = [
    { label: t('requiredExpense'), desc: `${getFixedForPeriod().length} ${t('itemsUnit')}`, amount: fixedTotal, color: 'var(--coral)', bg: 'var(--coral-surface)', iconName: 'receipt' },
    { label: t('savings'), desc: t('savingDesc'), amount: state.savings, color: 'var(--purple)', bg: 'var(--purple-surface)', iconName: 'heart' },
    { label: t('emergency'), desc: t('emergencyDesc'), amount: state.emergency, color: 'var(--blue)', bg: 'var(--blue-surface)', iconName: 'shield' },
    { label: t('shopItems'), desc: `${state.selected.length} ${t('itemsUnit')} · ${t('priceWord')} ${state.priceMode}`, amount: shopSpend, color: 'var(--sage)', bg: 'var(--sage-surface)', iconName: 'bag' },
  ].filter(p => p.amount > 0);

  if (parts.length === 0 || totalSpend === 0) return '';

  // find biggest
  const maxAmount = Math.max(...parts.map(p => p.amount));

  return `
  <div class="card card-pad">
    <div class="section-title">${icon('piechart', 17)} ${t('expenseBreakdown')}</div>
    <div style="font-size: 12px; color: var(--text-soft); margin-bottom: 14px; font-weight: 300;">
      ${t('totalAll')} <span style="color: var(--text); font-weight: 700;" class="num">฿${fmt(totalSpend)}</span>
      ${state.hideIncome ? '' : `${t('fromSalary')} ${t('incomeTotal')} <span class="num">฿${fmt(totalIncome)}</span>${totalIncome > 0 ? ` (${Math.round((totalSpend/totalIncome)*100)}%)` : ''}`}
    </div>

    <div class="breakdown">
      ${parts.map(p => {
        const pct = totalSpend > 0 ? Math.round((p.amount / totalSpend) * 100) : 0;
        const salaryPct = totalIncome > 0 ? Math.round((p.amount / totalIncome) * 100) : 0;
        const isBiggest = p.amount === maxAmount && parts.length > 1;
        return `
          <div class="breakdown-item">
            <div class="breakdown-icon" style="background:${p.bg}; color:${p.color}">
              ${icon(p.iconName, 16)}
            </div>
            <div class="breakdown-bar-wrap">
              <div class="breakdown-top">
                <div class="breakdown-label">
                  ${esc(p.label)}
                  ${isBiggest ? `<span class="biggest-chip">${icon('flame', 10)} ${t('biggest')}</span>` : ''}
                </div>
                <div class="breakdown-amount num">฿${fmt(p.amount)}</div>
              </div>
              <div class="breakdown-bar">
                <div class="breakdown-fill" style="width:${pct}%;background:${p.color}"></div>
              </div>
              <div class="breakdown-percent">
                <span style="color:${p.color}; font-weight: 600">${pct}%</span> ${t('ofTotal')}
                ${state.hideIncome ? '' : `· <span class="num">${salaryPct}%</span> ${t('ofSalary')}`}
                <span style="color:var(--text-faint); margin-left: 4px;">· ${p.desc}</span>
              </div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  </div>
  `;
}

  }, 0);

-note{font-size:10px;color:var(--text-faint,#a8a1ad);margin-top:2px}.sl43-item-price{text-align:right;font-size:13px;font-weight:900;color:var(--coral,#d2887a);white-space:nowrap}.sl43-item-cat{font-size:10px;font-weight:700;color:var(--sl43-soft);margin-top:2px}.sl43-empty{padding:42px 20px;text-align:center;color:var(--sl43-soft)}.sl43-empty-icon{width:58px;height:58px;margin:0 auto 12px;border-radius:50%;display:grid;place-items:center;background:rgba(225,215,245,.45);color:#8d75df}.sl43-empty-title{font-size:15px;font-weight:900;color:var(--sl43-text);margin-bottom:5px}
